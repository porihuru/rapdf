<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF・画像・カメラ文字抽出</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f8;
      color: #111;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
    }
    .version-badge {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #111827;
      color: #fff;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      z-index: 999;
    }
    h1 {
      margin-top: 0;
      font-size: 16px;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .preview-wrap {
      position: relative;
      width: 100%;
      max-width: 520px;
      margin-bottom: 12px;
    }
    .overlay-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      pointer-events: none;
    }
    button {
      border: none;
      background: #111827;
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .status {
      font-size: 14px;
      color: #374151;
    }
    .progress-wrap {
      margin: 8px 0 12px;
    }
    progress {
      width: 100%;
      height: 12px;
    }
    .progress-text {
      margin-top: 6px;
      font-size: 12px;
      color: #4b5563;
    }
    .log-panel {
      margin: 10px 0 12px;
      padding: 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #f9fafb;
      font-size: 12px;
    }
    .quota-status {
      color: #1f2937;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .api-log {
      max-height: 140px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: #374151;
      line-height: 1.5;
    }
    .error-box {
      margin-top: 8px;
      padding: 10px;
      border: 1px solid #fecaca;
      background: #fef2f2;
      color: #991b1b;
      border-radius: 8px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }
    .error-box.visible {
      display: block;
    }
    textarea {
      width: 100%;
      min-height: 420px;
      resize: vertical;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 12px;
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.5;
      background: #fafafa;
    }
    video,
    .preview-image,
    .preview-canvas {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #000;
      display: none;
    }
    .preview-image,
    .preview-canvas {
      object-fit: contain;
      background: #111;
    }
    .param-panel {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      background: #fafafa;
      margin: 10px 0 16px;
    }
    .param-panel label {
      font-size: 12px;
      color: #374151;
    }
    .param-panel input,
    .param-panel select {
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="versionBadge" class="version-badge">v8</div>
  <main class="container">
    <h1>PDF・画像・カメラから文字を抽出</h1>
    <div class="row">
      <input id="fileInput" type="file" accept=".pdf,image/*" />
    </div>
    <div class="row">
      <button id="startCameraBtn" type="button">カメラ開始</button>
      <button id="captureCameraBtn" type="button" disabled>撮影してOCR</button>
      <button id="stopCameraBtn" type="button" disabled>カメラ停止</button>
      <button id="copyBtn" type="button" disabled>抽出結果をコピー</button>
    </div>
    <div class="preview-wrap">
      <video id="cameraPreview" autoplay playsinline muted></video>
      <img id="filePreview" class="preview-image" alt="ファイルプレビュー" />
      <canvas id="capturePreview" class="preview-canvas"></canvas>
      <canvas id="overlayCanvas" class="overlay-canvas"></canvas>
    </div>
    <div class="param-panel">
      <div class="row">
        <label>
          言語
          <select id="langSelect">
            <option value="jpn+eng" selected>日本語 + 英語</option>
            <option value="jpn">日本語のみ</option>
            <option value="eng">英語のみ</option>
          </select>
        </label>
        <label>
          PSM
          <select id="psmSelect">
            <option value="3" selected>3: 自動（デフォルト）</option>
            <option value="4">4: 単一段組テキスト</option>
            <option value="6">6: 単一ブロック</option>
            <option value="7">7: 単一行</option>
            <option value="11">11: ばらばらな文字</option>
          </select>
        </label>
        <label>
          OEM
          <select id="oemSelect">
            <option value="1" selected>1: LSTM（推奨）</option>
            <option value="3">3: 既定（自動）</option>
          </select>
        </label>
        <label>
          文字限定
          <input id="whitelistInput" type="text" placeholder="例: 0123456789" />
        </label>
      </div>
      <div class="row">
        <label>
          画像スケール
          <input id="scaleInput" type="range" min="1" max="4" value="1" step="0.5" />
          <span id="scaleValue">1x</span>
        </label>
        <label>
          コントラスト
          <input id="contrastInput" type="range" min="0" max="200" value="100" step="10" />
          <span id="contrastValue">100%</span>
        </label>
        <label>
          二値化（閾値）
          <input id="thresholdInput" type="range" min="0" max="255" value="128" step="10" />
          <span id="thresholdValue">128</span>
        </label>
        <label>
          ノイズ除去
          <input id="denoiseInput" type="checkbox" />
        </label>
        <label>
          傾斜補正（度）
          <input id="rotationInput" type="range" min="-45" max="45" value="0" step="1" />
          <span id="rotationValue">0°</span>
        </label>
        <label>
          文字高さしきい値
          <input id="charSizeInput" type="range" min="0" max="120" value="0" step="1" />
          <span id="charSizeValue">0px</span>
        </label>
        <label>
          自信度しきい値
          <input id="confidenceInput" type="range" min="0" max="100" value="0" step="1" />
          <span id="confidenceValue">0%</span>
        </label>
      </div>
      <div class="row">
        <button id="toggleOverlayBtn" type="button" disabled>オーバレイ表示</button>
        <button id="reOcrBtn" type="button" disabled>再OCR</button>
        <button id="aiRefineBtn" type="button" disabled>AI連携（整形）</button>
        <label>
          Gemini APIキー
          <input id="aiApiKeyInput" type="password" placeholder="AIza..." />
        </label>
      </div>
    </div>
    <div id="status" class="status">PDFまたは画像を選択すると自動で抽出します。カメラも利用できます。</div>
    <div class="progress-wrap">
      <progress id="progressBar" value="0" max="100"></progress>
      <div id="progressText" class="progress-text">待機中</div>
    </div>
    <div class="log-panel">
      <div id="quotaStatus" class="quota-status">有料枠残量: 取得不可（Gemini APIでは残量を直接取得できません）</div>
      <div id="apiLog" class="api-log">APIログ: まだ実行されていません。</div>
    </div>
    <div id="errorBox" class="error-box"></div>
    <textarea id="output" placeholder="ここに抽出結果が表示されます" readonly></textarea>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.8.69/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    const fileInput = document.getElementById("fileInput");
    const startCameraBtn = document.getElementById("startCameraBtn");
    const captureCameraBtn = document.getElementById("captureCameraBtn");
    const stopCameraBtn = document.getElementById("stopCameraBtn");
    const cameraPreview = document.getElementById("cameraPreview");
    const filePreview = document.getElementById("filePreview");
    const capturePreview = document.getElementById("capturePreview");
    const overlayCanvas = document.getElementById("overlayCanvas");
    const copyBtn = document.getElementById("copyBtn");
    const toggleOverlayBtn = document.getElementById("toggleOverlayBtn");
    const reOcrBtn = document.getElementById("reOcrBtn");
    const aiRefineBtn = document.getElementById("aiRefineBtn");
    const aiApiKeyInput = document.getElementById("aiApiKeyInput");
    const status = document.getElementById("status");
    const output = document.getElementById("output");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");
    const quotaStatus = document.getElementById("quotaStatus");
    const apiLog = document.getElementById("apiLog");
    const errorBox = document.getElementById("errorBox");
    const versionBadge = document.getElementById("versionBadge");
    const langSelect = document.getElementById("langSelect");
    const psmSelect = document.getElementById("psmSelect");
    const oemSelect = document.getElementById("oemSelect");
    const whitelistInput = document.getElementById("whitelistInput");
    const scaleInput = document.getElementById("scaleInput");
    const scaleValue = document.getElementById("scaleValue");
    const contrastInput = document.getElementById("contrastInput");
    const contrastValue = document.getElementById("contrastValue");
    const thresholdInput = document.getElementById("thresholdInput");
    const thresholdValue = document.getElementById("thresholdValue");
    const denoiseInput = document.getElementById("denoiseInput");
    const rotationInput = document.getElementById("rotationInput");
    const rotationValue = document.getElementById("rotationValue");
    const charSizeInput = document.getElementById("charSizeInput");
    const charSizeValue = document.getElementById("charSizeValue");
    const confidenceInput = document.getElementById("confidenceInput");
    const confidenceValue = document.getElementById("confidenceValue");
    const APP_VERSION = "v9";

    let selectedFile = null;
    let mediaStream = null;
    let isProcessing = false;
    let lastOcrSource = null;
    let lastOcrType = "";
    let lastImageData = null;
    let overlayVisible = false;
    let lastOverlayData = null;
    let apiQuotaLimited = false;

    const apiStats = {
      success: 0,
      failed: 0,
      lastModel: "-",
      lastError: "-"
    };

    function appendApiLog(message) {
      const time = new Date().toLocaleTimeString("ja-JP", { hour12: false });
      if (!apiLog.dataset.hasLogs) {
        apiLog.textContent = "";
        apiLog.dataset.hasLogs = "1";
      }
      apiLog.textContent = `[${time}] ${message}\n${apiLog.textContent}`;
    }

    function updateQuotaStatus() {
      const quotaText = apiQuotaLimited
        ? "有料枠残量: 上限到達の可能性あり（無料枠/レート制限）"
        : "有料枠残量: 取得不可（Gemini APIでは残量を直接取得できません）";
      quotaStatus.textContent = `${quotaText} | 成功:${apiStats.success} 失敗:${apiStats.failed} 最終モデル:${apiStats.lastModel}`;
    }

    function updateAiButtonState() {
      const hasImageSource = (lastOcrType === "image" || lastOcrType === "camera") && Boolean(lastOcrSource);
      const hasKey = Boolean(aiApiKeyInput.value && aiApiKeyInput.value.trim().length > 0);
      aiRefineBtn.disabled = !hasImageSource || !hasKey || isProcessing;
    }

    versionBadge.textContent = APP_VERSION;

    scaleInput.addEventListener("input", () => {
      scaleValue.textContent = `${scaleInput.value}x`;
    });
    contrastInput.addEventListener("input", () => {
      contrastValue.textContent = `${contrastInput.value}%`;
    });
    thresholdInput.addEventListener("input", () => {
      thresholdValue.textContent = thresholdInput.value;
    });
    rotationInput.addEventListener("input", () => {
      rotationValue.textContent = `${rotationInput.value}°`;
    });
    charSizeInput.addEventListener("input", () => {
      charSizeValue.textContent = `${charSizeInput.value}px`;
      if (overlayVisible) drawOverlay();
    });
    confidenceInput.addEventListener("input", () => {
      confidenceValue.textContent = `${confidenceInput.value}%`;
      if (overlayVisible) drawOverlay();
    });
    aiApiKeyInput.addEventListener("input", updateAiButtonState);

    if (window.pdfjsLib?.GlobalWorkerOptions) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.8.69/build/pdf.worker.min.js";
    }

    function hideAllPreviews() {
      cameraPreview.style.display = "none";
      filePreview.style.display = "none";
      capturePreview.style.display = "none";
      overlayCanvas.style.display = "none";
    }

    function showFilePreview(file) {
      if (!file?.type?.startsWith("image/")) {
        return;
      }
      const objectUrl = URL.createObjectURL(file);
      filePreview.src = objectUrl;
      filePreview.onload = () => {
        URL.revokeObjectURL(objectUrl);
        if (overlayVisible) drawOverlay();
      };
      hideAllPreviews();
      filePreview.style.display = "block";
    }

    function showCanvasPreview(canvas) {
      capturePreview.width = canvas.width;
      capturePreview.height = canvas.height;
      const context = capturePreview.getContext("2d");
      context.drawImage(canvas, 0, 0);
      hideAllPreviews();
      capturePreview.style.display = "block";
    }

    function getOcrParams() {
      const params = {
        tessedit_pageseg_mode: psmSelect.value,
        tessedit_ocr_engine_mode: oemSelect.value
      };
      const whitelist = whitelistInput.value.trim();
      if (whitelist) {
        params.tessedit_char_whitelist = whitelist;
      }
      return params;
    }

    function setProgress(value, text) {
      const percent = Math.max(0, Math.min(100, Math.round(value)));
      progressBar.value = percent;
      progressText.textContent = text ?? `${percent}%`;
    }

    function clearError() {
      errorBox.textContent = "";
      errorBox.classList.remove("visible");
    }

    function buildAiRefinePrompt() {
      return [
        "あなたは画像OCRアシスタントです。",
        "目的: 画像内の文字を抽出し、読みやすく整形して返してください。",
        "ルール:",
        "- 不明箇所は断定せず、判読不能は [判読不能] と記載",
        "- 数値・日付・金額は最優先で保持",
        "- 説明や注釈は不要。抽出テキスト本文のみ返す"
      ].join("\n");
    }

    function scaleSize(width, height, maxSide = 1600) {
      const longest = Math.max(width, height);
      if (longest <= maxSide) return { width, height };
      const ratio = maxSide / longest;
      return {
        width: Math.max(1, Math.round(width * ratio)),
        height: Math.max(1, Math.round(height * ratio))
      };
    }

    function canvasToJpegBase64(canvas, quality = 0.85) {
      const dataUrl = canvas.toDataURL("image/jpeg", quality);
      return dataUrl.split(",")[1] || "";
    }

    async function fileToImageBitmap(file) {
      try {
        return await createImageBitmap(file);
      } catch {
        const dataUrl = await fileToDataUrl(file);
        return await new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error("画像の読み込みに失敗しました。"));
          img.src = dataUrl;
        });
      }
    }

    function drawScaledToCanvas(source, width, height) {
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(source, 0, 0, width, height);
      return canvas;
    }

    async function fileToDataUrl(file) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("画像の読み込みに失敗しました。"));
        reader.readAsDataURL(file);
      });
    }

    async function getAiImagePart() {
      if (lastOcrType === "camera" && lastImageData?.canvas) {
        const srcCanvas = lastImageData.canvas;
        const scaled = scaleSize(srcCanvas.width, srcCanvas.height, 1600);
        const resizedCanvas = drawScaledToCanvas(srcCanvas, scaled.width, scaled.height);
        const base64 = canvasToJpegBase64(resizedCanvas);
        if (!base64) throw new Error("カメラ画像の変換に失敗しました。");
        return {
          inline_data: {
            mime_type: "image/jpeg",
            data: base64
          }
        };
      }

      if (lastOcrType === "image" && lastOcrSource instanceof File) {
        const imageSource = await fileToImageBitmap(lastOcrSource);
        const sourceWidth = imageSource.width || imageSource.naturalWidth || 0;
        const sourceHeight = imageSource.height || imageSource.naturalHeight || 0;
        const scaled = scaleSize(sourceWidth, sourceHeight, 1600);
        const resizedCanvas = drawScaledToCanvas(imageSource, scaled.width, scaled.height);
        if (typeof imageSource.close === "function") {
          imageSource.close();
        }
        const base64 = canvasToJpegBase64(resizedCanvas);
        if (!base64) throw new Error("画像ファイルの変換に失敗しました。");
        return {
          inline_data: {
            mime_type: "image/jpeg",
            data: base64
          }
        };
      }

      throw new Error("AI連携用の画像がありません。画像またはカメラでOCRを実行してください。");
    }

    function extractGeminiErrorMessage(responseJson) {
      const message = responseJson?.error?.message;
      if (!message) return "Gemini APIエラーが発生しました。";
      if (/API key not valid|invalid api key/i.test(message)) {
        return "APIキーが無効です。キーを確認してください。";
      }
      if (/PERMISSION_DENIED|API has not been used|not enabled/i.test(message)) {
        return "API利用権限がありません。Generative Language APIの有効化とキー制限設定を確認してください。";
      }
      if (/quota|rate limit|RESOURCE_EXHAUSTED/i.test(message)) {
        apiQuotaLimited = true;
        return "無料枠またはレート制限に達しました。時間を置いて再実行してください。";
      }
      if (/payload|too large|request entity too large/i.test(message)) {
        return "送信画像サイズが大きすぎる可能性があります。より小さい画像で再試行してください。";
      }
      return message;
    }

    async function callGeminiWithModel(modelName, apiKey, imagePart) {
      appendApiLog(`Gemini呼び出し開始: ${modelName}`);
      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${encodeURIComponent(apiKey)}`;
      const response = await fetch(endpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: buildAiRefinePrompt() },
              imagePart
            ]
          }],
          generationConfig: {
            temperature: 0.2
          }
        })
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        const err = new Error(extractGeminiErrorMessage(data));
        err.status = response.status;
        appendApiLog(`失敗: ${modelName} (${response.status}) ${err.message}`);
        throw err;
      }
      appendApiLog(`成功: ${modelName}`);
      return data;
    }

    async function analyzeImageWithGemini(apiKey) {
      const imagePart = await getAiImagePart();
      const modelCandidates = [
        "gemini-2.5-flash-lite",
        "gemini-2.5-flash",
        "gemini-2.0-flash"
      ];

      let data = null;
      let lastError = null;
      for (const model of modelCandidates) {
        try {
          data = await callGeminiWithModel(model, apiKey, imagePart);
          apiStats.lastModel = model;
          break;
        } catch (error) {
          lastError = error;
          apiStats.lastError = error?.message || "unknown";
          if (![400, 404].includes(error?.status)) {
            throw error;
          }
        }
      }
      if (!data) {
        throw lastError || new Error("利用可能なGeminiモデルで解析できませんでした。");
      }

      const refined = (data?.candidates ?? [])
        .flatMap((candidate) => candidate?.content?.parts ?? [])
        .map((part) => part?.text ?? "")
        .join("\n")
        .trim();

      if (!refined) {
        throw new Error("AIの応答が空でした。もう一度お試しください。");
      }

      return refined;
    }

    function showError(message, detail = "") {
      status.textContent = `エラー: ${message}`;
      errorBox.textContent = detail ? `${message}\n${detail}` : message;
      errorBox.classList.add("visible");
      setProgress(0, "エラーで停止しました");
    }

    function formatError(error) {
      if (!error) return "不明なエラー";
      const name = error.name ? `${error.name}: ` : "";
      const message = error.message || String(error);
      return `${name}${message}`;
    }

    async function getPreferredCameraStream() {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error("MediaDevicesUnsupported");
      }

      const constraintsList = [
        {
          video: {
            facingMode: { exact: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        },
        {
          video: {
            facingMode: "environment",
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        },
        { video: true, audio: false }
      ];

      for (const constraints of constraintsList) {
        try {
          return await navigator.mediaDevices.getUserMedia(constraints);
        } catch (error) {
          if (!["OverconstrainedError", "NotFoundError", "NotReadableError", "AbortError"].includes(error?.name)) {
            throw error;
          }
        }
      }

      throw new Error("No available camera stream");
    }

    function withPercent(label, value, suffix = "") {
      const percent = Math.max(0, Math.min(100, Math.round(value)));
      status.textContent = `${label} ${percent}%${suffix}`;
      setProgress(percent, `${label} ${percent}%`);
    }

    async function recognizeWithProgress(target, label) {
      if (!window.Tesseract?.recognize) {
        throw new Error("Tesseract.jsの読み込みに失敗しました。通信環境を確認してください。");
      }
      return window.Tesseract.recognize(target, langSelect.value, {
        tessedit_pageseg_mode: psmSelect.value,
        tessedit_ocr_engine_mode: oemSelect.value,
        tessedit_char_whitelist: whitelistInput.value.trim() || undefined,
        logger: (message) => {
          if (typeof message.progress === "number") {
            withPercent(label, message.progress * 100, message.status ? ` (${message.status})` : "");
          }
        }
      });
    }

    async function extractPdf(file) {
      try {
        clearOverlayData();
        clearError();
        isProcessing = true;
        fileInput.disabled = true;
        startCameraBtn.disabled = true;
        captureCameraBtn.disabled = true;
        copyBtn.disabled = true;
        output.value = "";
        status.textContent = "PDFを読み込み中...";
        setProgress(5, "PDFを読み込み中...");

        if (!window.pdfjsLib?.getDocument) {
          throw new Error("PDF.jsの読み込みに失敗しました。通信環境を確認してください。");
        }

        const data = await file.arrayBuffer();
        const loadingTask = window.pdfjsLib.getDocument({ data });
        const pdf = await loadingTask.promise;

        let allText = "";

        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          withPercent("PDF抽出中...", (pageNum / pdf.numPages) * 100, ` (${pageNum}/${pdf.numPages} ページ)`);
          const page = await pdf.getPage(pageNum);
          const textContent = await page.getTextContent();
          const pageText = textContent.items
            .map((item) => item.str)
            .join(" ")
            .replace(/\s+/g, " ")
            .trim();

          allText += `--- Page ${pageNum} ---\n${pageText}\n\n`;
        }

        output.value = allText.trim();
        copyBtn.disabled = output.value.length === 0;
        updateAiButtonState();
        if (!output.value) {
          status.textContent = "完了: 文字を検出できませんでした（画像PDFの可能性があります）。";
        } else {
          status.textContent = `完了: ${pdf.numPages} ページから抽出しました。`;
        }
        setProgress(100, "PDF抽出が完了しました");
        lastOcrSource = file;
        lastOcrType = "pdf";
        reOcrBtn.disabled = false;
      } catch (error) {
        showError("PDFの読み取りに失敗しました。", formatError(error));
        output.value = "";
        console.error(error);
      } finally {
        isProcessing = false;
        fileInput.disabled = false;
        startCameraBtn.disabled = false;
        captureCameraBtn.disabled = !mediaStream;
        fileInput.value = "";
      }
    }

    async function extractImage(file) {
      try {
        clearError();
        isProcessing = true;
        fileInput.disabled = true;
        startCameraBtn.disabled = true;
        captureCameraBtn.disabled = true;
        copyBtn.disabled = true;
        output.value = "";
        status.textContent = "画像OCRを実行中...";
        setProgress(3, "画像OCRを開始...");

        const result = await recognizeWithProgress(file, "画像OCR中...");
        output.value = result.data.text.trim();
        copyBtn.disabled = output.value.length === 0;
        updateAiButtonState();
        status.textContent = "完了: 画像から文字を抽出しました。";
        setProgress(100, "画像OCRが完了しました");
        setOverlayData(result, filePreview.naturalWidth, filePreview.naturalHeight);
        lastOcrSource = file;
        lastOcrType = "image";
        reOcrBtn.disabled = false;
      } catch (error) {
        showError("画像OCRに失敗しました。", formatError(error));
        output.value = "";
        console.error(error);
      } finally {
        isProcessing = false;
        fileInput.disabled = false;
        startCameraBtn.disabled = false;
        captureCameraBtn.disabled = !mediaStream;
        fileInput.value = "";
      }
    }

    function showCanvasPreview(canvas) {
      capturePreview.width = canvas.width;
      capturePreview.height = canvas.height;
      const context = capturePreview.getContext("2d");
      context.drawImage(canvas, 0, 0);
      hideAllPreviews();
      capturePreview.style.display = "block";
      lastImageData = { canvas, width: canvas.width, height: canvas.height };
      if (overlayVisible) drawOverlay();
    }

    function updateOverlayButtonText() {
      toggleOverlayBtn.textContent = overlayVisible ? "オーバレイ非表示" : "オーバレイ表示";
    }

    function getActivePreviewElement() {
      if (filePreview.style.display === "block") return filePreview;
      if (capturePreview.style.display === "block") return capturePreview;
      return null;
    }

    function clearOverlayData() {
      lastOverlayData = null;
      overlayCanvas.style.display = "none";
      toggleOverlayBtn.disabled = true;
      overlayVisible = false;
      updateOverlayButtonText();
    }

    function toOverlayWords(result) {
      const words = result?.data?.words ?? [];
      return words
        .map((word) => {
          const box = word?.bbox ?? {};
          const x0 = Number(box.x0 ?? 0);
          const y0 = Number(box.y0 ?? 0);
          const x1 = Number(box.x1 ?? 0);
          const y1 = Number(box.y1 ?? 0);
          return {
            text: word?.text ?? "",
            confidence: Number(word?.confidence ?? 0),
            x: Math.min(x0, x1),
            y: Math.min(y0, y1),
            width: Math.abs(x1 - x0),
            height: Math.abs(y1 - y0)
          };
        })
        .filter((word) => word.width > 0 && word.height > 0);
    }

    function setOverlayData(result, width, height) {
      const words = toOverlayWords(result);
      lastOverlayData = {
        words,
        sourceWidth: Math.max(1, Number(width) || 1),
        sourceHeight: Math.max(1, Number(height) || 1)
      };
      toggleOverlayBtn.disabled = words.length === 0;
      if (words.length === 0) {
        overlayVisible = false;
      }
      updateOverlayButtonText();
      if (overlayVisible) drawOverlay();
    }

    function drawOverlay() {
      if (!overlayVisible || !lastOverlayData) {
        overlayCanvas.style.display = "none";
        return;
      }

      const previewElement = getActivePreviewElement();
      if (!previewElement) {
        overlayCanvas.style.display = "none";
        return;
      }

      const width = previewElement.clientWidth;
      const height = previewElement.clientHeight;
      if (!width || !height) {
        overlayCanvas.style.display = "none";
        return;
      }

      const dpr = window.devicePixelRatio || 1;
      overlayCanvas.width = Math.round(width * dpr);
      overlayCanvas.height = Math.round(height * dpr);
      overlayCanvas.style.width = `${width}px`;
      overlayCanvas.style.height = `${height}px`;
      overlayCanvas.style.display = "block";

      const ctx = overlayCanvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);

      const scaleX = width / lastOverlayData.sourceWidth;
      const scaleY = height / lastOverlayData.sourceHeight;

      ctx.lineWidth = 1.5;
      ctx.strokeStyle = "rgba(34, 197, 94, 0.95)";
      ctx.fillStyle = "rgba(34, 197, 94, 0.20)";
      const minCharHeight = parseInt(charSizeInput.value, 10) || 0;
      const minConfidence = parseInt(confidenceInput.value, 10) || 0;
      ctx.font = "12px sans-serif";

      for (const word of lastOverlayData.words) {
        if (word.height < minCharHeight) {
          continue;
        }
        if (word.confidence < minConfidence) {
          continue;
        }
        const x = word.x * scaleX;
        const y = word.y * scaleY;
        const boxWidth = Math.max(1, word.width * scaleX);
        const boxHeight = Math.max(1, word.height * scaleY);

        ctx.fillRect(x, y, boxWidth, boxHeight);
        ctx.strokeRect(x, y, boxWidth, boxHeight);

        const label = `${word.text} (${Math.round(word.confidence)}%)`;
        const textY = y > 14 ? y - 4 : y + 14;
        ctx.fillStyle = "rgba(17, 24, 39, 0.95)";
        ctx.fillText(label, x, textY);
        ctx.fillStyle = "rgba(34, 197, 94, 0.20)";
      }
    }

    function applyImageEnhancements(sourceCanvas) {
      const tempCanvas = document.createElement("canvas");
      const scale = parseFloat(scaleInput.value) || 1;
      const contrast = parseFloat(contrastInput.value) || 100;
      const threshold = parseInt(thresholdInput.value, 10) || 128;
      const denoise = denoiseInput.checked;
      const rotation = parseInt(rotationInput.value, 10) || 0;

      let baseCanvas = sourceCanvas;
      if (rotation !== 0) {
        const rotCanvas = document.createElement("canvas");
        const diagLength = Math.sqrt(sourceCanvas.width ** 2 + sourceCanvas.height ** 2);
        rotCanvas.width = diagLength;
        rotCanvas.height = diagLength;
        const rotCtx = rotCanvas.getContext("2d");
        rotCtx.translate(diagLength / 2, diagLength / 2);
        rotCtx.rotate((rotation * Math.PI) / 180);
        rotCtx.drawImage(sourceCanvas, -sourceCanvas.width / 2, -sourceCanvas.height / 2);
        baseCanvas = rotCanvas;
      }

      tempCanvas.width = baseCanvas.width * scale;
      tempCanvas.height = baseCanvas.height * scale;
      const ctx = tempCanvas.getContext("2d");

      if (scale !== 1) {
        ctx.drawImage(baseCanvas, 0, 0, tempCanvas.width, tempCanvas.height);
      } else {
        ctx.drawImage(baseCanvas, 0, 0);
      }

      if (contrast !== 100 || denoise || threshold !== 128) {
        const imageData = ctx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];

          let gray = 0.299 * r + 0.587 * g + 0.114 * b;

          if (contrast !== 100) {
            gray = ((gray - 128) * (contrast / 100)) + 128;
          }

          if (threshold !== 128) {
            gray = gray > threshold ? 255 : 0;
          }

          const finalVal = Math.max(0, Math.min(255, gray));
          data[i] = finalVal;
          data[i + 1] = finalVal;
          data[i + 2] = finalVal;
        }

        ctx.putImageData(imageData, 0, 0);
      }

      return tempCanvas;
    }

    async function handleSelectedFile(file) {
      if (isProcessing) {
        status.textContent = "処理中です。完了後にもう一度ファイルを選択してください。";
        return;
      }

      selectedFile = file ?? null;

      if (!selectedFile) {
        status.textContent = "PDFまたは画像ファイルを選択してください。";
        return;
      }

      clearError();
      status.textContent = `ファイル確認中: ${selectedFile.name}`;
      setProgress(1, "ファイル種別を判定中...");

      const mimeType = (selectedFile.type ?? "").toLowerCase();
      const lowerName = (selectedFile.name ?? "").toLowerCase();
      const isPdf = mimeType === "application/pdf" || lowerName.endsWith(".pdf");
      const isImage = mimeType.startsWith("image/")
        || /\.(png|jpe?g|gif|bmp|webp|tiff?|heic|heif)$/i.test(lowerName);

      if (isPdf) {
        await extractPdf(selectedFile);
        return;
      }

      if (isImage) {
        showFilePreview(selectedFile);
        await extractImage(selectedFile);
        return;
      }

      status.textContent = "未対応のファイル形式です。PDFまたは画像を選択してください。";
      output.value = "";
      fileInput.value = "";
      setProgress(0, "未対応ファイルです");
    }

    fileInput.addEventListener("change", async (event) => {
      await handleSelectedFile(event.target.files?.[0] ?? null);
    });

    fileInput.addEventListener("input", async (event) => {
      await handleSelectedFile(event.target.files?.[0] ?? null);
    });

    startCameraBtn.addEventListener("click", async () => {
      if (mediaStream && mediaStream.active) {
        status.textContent = "カメラはすでに起動中です。";
        return;
      }
      try {
        clearError();
        if (window.isSecureContext === false && location.hostname !== "localhost") {
          showError("カメラはHTTPSまたはlocalhostでのみ利用できます。");
          return;
        }

        startCameraBtn.disabled = true;
        stopCameraBtn.disabled = true;
        setProgress(5, "カメラを起動中...");
        mediaStream = await getPreferredCameraStream();
        cameraPreview.srcObject = mediaStream;
        await cameraPreview.play().catch(() => {});
        hideAllPreviews();
        cameraPreview.style.display = "block";
        captureCameraBtn.disabled = false;
        stopCameraBtn.disabled = false;
        status.textContent = "カメラ起動中。撮影してOCRを押してください。";
        setProgress(100, "カメラ起動完了");
      } catch (error) {
        if (error?.name === "NotAllowedError") {
          showError("カメラ権限が拒否されました。ブラウザ設定で許可してください。", formatError(error));
        } else if (error?.message === "MediaDevicesUnsupported") {
          showError("このブラウザはカメラAPIに対応していません。", formatError(error));
        } else {
          showError("カメラを起動できませんでした。", formatError(error));
        }
        console.error(error);
      } finally {
        startCameraBtn.disabled = false;
      }
    });

    stopCameraBtn.addEventListener("click", () => {
      if (!mediaStream) return;
      mediaStream.getTracks().forEach((track) => track.stop());
      mediaStream = null;
      cameraPreview.srcObject = null;
      hideAllPreviews();
      captureCameraBtn.disabled = true;
      stopCameraBtn.disabled = true;
      status.textContent = "カメラを停止しました。";
      setProgress(0, "待機中");
    });

    captureCameraBtn.addEventListener("click", async () => {
      if (!mediaStream) {
        status.textContent = "先にカメラを開始してください。";
        return;
      }

      try {
        clearError();
        isProcessing = true;
        fileInput.disabled = true;
        startCameraBtn.disabled = true;
        captureCameraBtn.disabled = true;
        copyBtn.disabled = true;
        output.value = "";
        status.textContent = "撮影画像をOCR中...";
        setProgress(3, "撮影画像OCRを開始...");

        const canvas = document.createElement("canvas");
        canvas.width = cameraPreview.videoWidth;
        canvas.height = cameraPreview.videoHeight;
        const context = canvas.getContext("2d");
        context.drawImage(cameraPreview, 0, 0, canvas.width, canvas.height);

        mediaStream.getTracks().forEach((track) => track.stop());
        mediaStream = null;
        cameraPreview.srcObject = null;
        showCanvasPreview(canvas);
        stopCameraBtn.disabled = true;

        const enhancedCanvas = applyImageEnhancements(canvas);
        const result = await recognizeWithProgress(enhancedCanvas, "撮影画像OCR中...");
        output.value = result.data.text.trim();
        copyBtn.disabled = output.value.length === 0;
        updateAiButtonState();
        status.textContent = "完了: カメラ画像から文字を抽出しました。";
        setProgress(100, "撮影画像OCRが完了しました");
        setOverlayData(result, enhancedCanvas.width, enhancedCanvas.height);
        lastOcrSource = canvas;
        lastOcrType = "camera";
        reOcrBtn.disabled = false;
      } catch (error) {
        showError("カメラ画像OCRに失敗しました。", formatError(error));
        output.value = "";
        console.error(error);
      } finally {
        isProcessing = false;
        fileInput.disabled = false;
        startCameraBtn.disabled = false;
        captureCameraBtn.disabled = !mediaStream;
      }
    });

    copyBtn.addEventListener("click", async () => {
      if (!output.value) return;
      try {
        clearError();
        await navigator.clipboard.writeText(output.value);
        status.textContent = "抽出結果をコピーしました。";
      } catch {
        showError("コピーに失敗しました。手動でコピーしてください。");
      }
    });

    reOcrBtn.addEventListener("click", async () => {
      if (!lastOcrSource || isProcessing) return;

      if (lastOcrType === "camera" && lastImageData?.canvas) {
        const enhancedCanvas = applyImageEnhancements(lastImageData.canvas);
        try {
          clearError();
          isProcessing = true;
          output.value = "";
          status.textContent = "再OCR実行中...";
          setProgress(3, "再OCR開始...");
          const result = await recognizeWithProgress(enhancedCanvas, "再OCR中...");
          output.value = result.data.text.trim();
          copyBtn.disabled = output.value.length === 0;
          updateAiButtonState();
          status.textContent = "完了: 再OCRが完了しました。";
          setProgress(100, "再OCRが完了しました");
          setOverlayData(result, enhancedCanvas.width, enhancedCanvas.height);
        } catch (error) {
          showError("再OCRに失敗しました。", formatError(error));
          console.error(error);
        } finally {
          isProcessing = false;
        }
        return;
      }

      if (lastOcrType === "pdf") {
        await extractPdf(lastOcrSource);
      } else {
        await extractImage(lastOcrSource);
      }
    });

    toggleOverlayBtn.addEventListener("click", () => {
      if (!lastOverlayData) return;
      overlayVisible = !overlayVisible;
      updateOverlayButtonText();
      drawOverlay();
    });

    aiRefineBtn.addEventListener("click", async () => {
      const apiKey = aiApiKeyInput.value.trim();
      if (!apiKey) {
        showError("Gemini APIキーを入力してください。");
        return;
      }
      if (!(lastOcrType === "image" || lastOcrType === "camera")) {
        showError("AI連携は画像またはカメラOCRで利用できます。PDFは未対応です。");
        return;
      }

      try {
        clearError();
        appendApiLog("AI連携ボタン押下");
        isProcessing = true;
        updateAiButtonState();
        aiRefineBtn.disabled = true;
        fileInput.disabled = true;
        startCameraBtn.disabled = true;
        captureCameraBtn.disabled = true;
        reOcrBtn.disabled = true;
        status.textContent = "Geminiで画像解析中...";
        setProgress(15, "画像をGeminiへ送信中...");

        const analyzedText = await analyzeImageWithGemini(apiKey);
        output.value = analyzedText;
        copyBtn.disabled = output.value.length === 0;
        apiStats.success += 1;
        apiQuotaLimited = false;
        updateQuotaStatus();
        status.textContent = "完了: Gemini画像解析が完了しました。";
        setProgress(100, "Gemini画像解析が完了しました");
      } catch (error) {
        apiStats.failed += 1;
        updateQuotaStatus();
        showError("AI連携に失敗しました。", formatError(error));
        console.error(error);
      } finally {
        isProcessing = false;
        fileInput.disabled = false;
        startCameraBtn.disabled = false;
        captureCameraBtn.disabled = !mediaStream;
        reOcrBtn.disabled = !lastOcrSource;
        updateAiButtonState();
      }
    });

    window.addEventListener("resize", () => {
      if (overlayVisible) drawOverlay();
    });

    setProgress(0, "待機中");
    updateOverlayButtonText();
    updateAiButtonState();
    updateQuotaStatus();
  </script>
</body>
</html>
