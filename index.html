<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF・画像・カメラ文字抽出</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f8;
      color: #111;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
    }
    .version-badge {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #111827;
      color: #fff;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      z-index: 999;
    }
    h1 {
      margin-top: 0;
      font-size: 24px;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    button {
      border: none;
      background: #111827;
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .status {
      font-size: 14px;
      color: #374151;
    }
    textarea {
      width: 100%;
      min-height: 420px;
      resize: vertical;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 12px;
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.5;
      background: #fafafa;
    }
    video {
      width: 100%;
      max-width: 520px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #000;
      display: none;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div id="versionBadge" class="version-badge">v-</div>
  <main class="container">
    <h1>PDF・画像・カメラから文字を抽出</h1>
    <div class="row">
      <input id="fileInput" type="file" accept="application/pdf,image/*" />
    </div>
    <div class="row">
      <button id="startCameraBtn" type="button">カメラ開始</button>
      <button id="captureCameraBtn" type="button" disabled>撮影してOCR</button>
      <button id="stopCameraBtn" type="button" disabled>カメラ停止</button>
      <button id="copyBtn" type="button" disabled>抽出結果をコピー</button>
    </div>
    <video id="cameraPreview" autoplay playsinline muted></video>
    <div id="status" class="status">PDFまたは画像を選択すると自動で抽出します。カメラも利用できます。</div>
    <textarea id="output" placeholder="ここに抽出結果が表示されます" readonly></textarea>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.8.69/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.8.69/build/pdf.worker.min.js";

    const fileInput = document.getElementById("fileInput");
    const startCameraBtn = document.getElementById("startCameraBtn");
    const captureCameraBtn = document.getElementById("captureCameraBtn");
    const stopCameraBtn = document.getElementById("stopCameraBtn");
    const cameraPreview = document.getElementById("cameraPreview");
    const copyBtn = document.getElementById("copyBtn");
    const status = document.getElementById("status");
    const output = document.getElementById("output");
    const versionBadge = document.getElementById("versionBadge");

    let selectedFile = null;
    let mediaStream = null;

    function hashText(text) {
      let hash = 5381;
      for (let index = 0; index < text.length; index++) {
        hash = (hash * 33) ^ text.charCodeAt(index);
      }
      return (hash >>> 0).toString(16);
    }

    function updateVersionBadge() {
      const storageKey = "rapdf-version-state";
      const sourceHash = hashText(document.documentElement.outerHTML);
      const rawState = localStorage.getItem(storageKey);

      let state = { hash: "", version: 0 };
      if (rawState) {
        try {
          const parsed = JSON.parse(rawState);
          state = {
            hash: typeof parsed.hash === "string" ? parsed.hash : "",
            version: Number.isInteger(parsed.version) ? parsed.version : 0
          };
        } catch {
          state = { hash: "", version: 0 };
        }
      }

      if (state.hash !== sourceHash) {
        state.version += 1;
        state.hash = sourceHash;
        localStorage.setItem(storageKey, JSON.stringify(state));
      }

      versionBadge.textContent = `v${state.version}`;
    }

    updateVersionBadge();

    async function getPreferredCameraStream() {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error("MediaDevicesUnsupported");
      }

      const constraintsList = [
        {
          video: {
            facingMode: { exact: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        },
        {
          video: {
            facingMode: "environment",
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        },
        { video: true, audio: false }
      ];

      for (const constraints of constraintsList) {
        try {
          return await navigator.mediaDevices.getUserMedia(constraints);
        } catch (error) {
          if (!["OverconstrainedError", "NotFoundError", "NotReadableError", "AbortError"].includes(error?.name)) {
            throw error;
          }
        }
      }

      throw new Error("No available camera stream");
    }

    async function extractPdf(file) {
      try {
        fileInput.disabled = true;
        startCameraBtn.disabled = true;
        captureCameraBtn.disabled = true;
        copyBtn.disabled = true;
        output.value = "";
        status.textContent = "PDFを読み込み中...";

        const data = await file.arrayBuffer();
        const loadingTask = pdfjsLib.getDocument({ data });
        const pdf = await loadingTask.promise;

        let allText = "";

        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          status.textContent = `抽出中... ${pageNum}/${pdf.numPages} ページ`;
          const page = await pdf.getPage(pageNum);
          const textContent = await page.getTextContent();
          const pageText = textContent.items
            .map((item) => item.str)
            .join(" ")
            .replace(/\s+/g, " ")
            .trim();

          allText += `--- Page ${pageNum} ---\n${pageText}\n\n`;
        }

        output.value = allText.trim();
        copyBtn.disabled = output.value.length === 0;
        status.textContent = `完了: ${pdf.numPages} ページから抽出しました。`;
      } catch (error) {
        status.textContent = "エラー: PDFの読み取りに失敗しました。";
        output.value = "";
        console.error(error);
      } finally {
        fileInput.disabled = false;
        startCameraBtn.disabled = false;
        captureCameraBtn.disabled = !mediaStream;
      }
    }

    async function extractImage(file) {
      try {
        fileInput.disabled = true;
        startCameraBtn.disabled = true;
        captureCameraBtn.disabled = true;
        copyBtn.disabled = true;
        output.value = "";
        status.textContent = "画像OCRを実行中...";

        const result = await window.Tesseract.recognize(file, "jpn+eng");
        output.value = result.data.text.trim();
        copyBtn.disabled = output.value.length === 0;
        status.textContent = "完了: 画像から文字を抽出しました。";
      } catch (error) {
        status.textContent = "エラー: 画像OCRに失敗しました。";
        output.value = "";
        console.error(error);
      } finally {
        fileInput.disabled = false;
        startCameraBtn.disabled = false;
        captureCameraBtn.disabled = !mediaStream;
      }
    }

    fileInput.addEventListener("change", async () => {
      selectedFile = fileInput.files?.[0] ?? null;

      if (!selectedFile) {
        status.textContent = "PDFまたは画像ファイルを選択してください。";
        return;
      }

      const mimeType = selectedFile.type.toLowerCase();
      const lowerName = selectedFile.name.toLowerCase();
      const isPdf = mimeType === "application/pdf" || lowerName.endsWith(".pdf");
      const isImage = mimeType.startsWith("image/")
        || /\.(png|jpe?g|gif|bmp|webp|tiff?|heic|heif)$/i.test(lowerName);

      status.textContent = `ファイル選択中: ${selectedFile.name}`;

      if (isPdf) {
        await extractPdf(selectedFile);
        return;
      }

      if (isImage) {
        await extractImage(selectedFile);
        return;
      }

      status.textContent = "未対応のファイル形式です。PDFまたは画像を選択してください。";
      output.value = "";
    });

    startCameraBtn.addEventListener("click", async () => {
      if (mediaStream) return;
      try {
        if (window.isSecureContext === false) {
          status.textContent = "エラー: カメラはHTTPSまたはlocalhostでのみ利用できます。";
          return;
        }

        startCameraBtn.disabled = true;
        mediaStream = await getPreferredCameraStream();
        cameraPreview.srcObject = mediaStream;
        cameraPreview.style.display = "block";
        captureCameraBtn.disabled = false;
        stopCameraBtn.disabled = false;
        status.textContent = "カメラ起動中。撮影してOCRを押してください。";
      } catch (error) {
        if (error?.name === "NotAllowedError") {
          status.textContent = "エラー: カメラ権限が拒否されました。ブラウザ設定で許可してください。";
        } else if (error?.message === "MediaDevicesUnsupported") {
          status.textContent = "エラー: このブラウザはカメラAPIに対応していません。";
        } else {
          status.textContent = "エラー: カメラを起動できませんでした。";
        }
        console.error(error);
      } finally {
        startCameraBtn.disabled = false;
      }
    });

    stopCameraBtn.addEventListener("click", () => {
      if (!mediaStream) return;
      mediaStream.getTracks().forEach((track) => track.stop());
      mediaStream = null;
      cameraPreview.srcObject = null;
      cameraPreview.style.display = "none";
      captureCameraBtn.disabled = true;
      stopCameraBtn.disabled = true;
      status.textContent = "カメラを停止しました。";
    });

    captureCameraBtn.addEventListener("click", async () => {
      if (!mediaStream) {
        status.textContent = "先にカメラを開始してください。";
        return;
      }

      try {
        fileInput.disabled = true;
        startCameraBtn.disabled = true;
        captureCameraBtn.disabled = true;
        copyBtn.disabled = true;
        output.value = "";
        status.textContent = "撮影画像をOCR中...";

        const canvas = document.createElement("canvas");
        canvas.width = cameraPreview.videoWidth;
        canvas.height = cameraPreview.videoHeight;
        const context = canvas.getContext("2d");
        context.drawImage(cameraPreview, 0, 0, canvas.width, canvas.height);

        const result = await window.Tesseract.recognize(canvas, "jpn+eng");
        output.value = result.data.text.trim();
        copyBtn.disabled = output.value.length === 0;
        status.textContent = "完了: カメラ画像から文字を抽出しました。";
      } catch (error) {
        status.textContent = "エラー: カメラ画像OCRに失敗しました。";
        output.value = "";
        console.error(error);
      } finally {
        fileInput.disabled = false;
        startCameraBtn.disabled = false;
        captureCameraBtn.disabled = !mediaStream;
      }
    });

    copyBtn.addEventListener("click", async () => {
      if (!output.value) return;
      try {
        await navigator.clipboard.writeText(output.value);
        status.textContent = "抽出結果をコピーしました。";
      } catch {
        status.textContent = "コピーに失敗しました。手動でコピーしてください。";
      }
    });
  </script>
</body>
</html>
