<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF・画像・カメラ文字抽出</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f8;
      color: #111;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
    }
    .version-badge {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #111827;
      color: #fff;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      z-index: 999;
    }
    h1 {
      margin-top: 0;
      font-size: 16px;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .preview-wrap {
      position: relative;
      width: 100%;
      max-width: none;
      margin-bottom: 0;
    }
    .preview-section {
      display: flex;
      gap: 12px;
      align-items: stretch;
      width: 100%;
      margin-bottom: 8px;
    }
    .preview-pane,
    .preview-text-wrap {
      width: calc(40% - 6px);
      min-width: 0;
    }
    .preview-text-wrap {
      width: calc(60% - 6px);
    }
    .preview-text-wrap {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 220px;
    }
    .preview-text-title {
      padding: 8px 10px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 12px;
      color: #374151;
      font-weight: 600;
      background: #f3f4f6;
    }
    .preview-side-text {
      margin: 0;
      padding: 10px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
      overflow-y: scroll;
      min-height: 0;
      flex: 1;
    }
    .preview-number-mark {
      font-weight: 700;
    }
    .pager-row {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }
    .pager-row button {
      padding: 8px 12px;
      font-size: 12px;
    }
    .pager-label {
      font-size: 12px;
      color: #374151;
      min-width: 72px;
      text-align: center;
    }
    @media (max-width: 860px) {
      .preview-section {
        flex-direction: column;
      }
      .preview-pane,
      .preview-text-wrap {
        width: 100%;
      }
    }
    .overlay-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      pointer-events: none;
    }
    button {
      border: none;
      background: #111827;
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .status {
      font-size: 14px;
      color: #374151;
    }
    .progress-wrap {
      margin: 8px 0 12px;
    }
    progress {
      width: 100%;
      height: 12px;
    }
    .progress-text {
      margin-top: 6px;
      font-size: 12px;
      color: #4b5563;
    }
    .log-panel {
      margin: 10px 0 12px;
      padding: 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #f9fafb;
      font-size: 12px;
    }
    .quota-status {
      color: #1f2937;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .api-log {
      max-height: 140px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: #374151;
      line-height: 1.5;
    }
    .error-box {
      margin-top: 8px;
      padding: 10px;
      border: 1px solid #fecaca;
      background: #fef2f2;
      color: #991b1b;
      border-radius: 8px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }
    .error-box.visible {
      display: block;
    }
    textarea {
      width: 100%;
      min-height: 420px;
      resize: vertical;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 12px;
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.5;
      background: #fafafa;
    }
    video,
    .preview-image,
    .preview-canvas {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #000;
      display: none;
    }
    .preview-image,
    .preview-canvas {
      object-fit: contain;
      background: #111;
    }
    .param-panel {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      background: #fafafa;
      margin: 10px 0 16px;
    }
    .param-panel label {
      font-size: 12px;
      color: #374151;
    }
    .param-panel input,
    .param-panel select {
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
    }
    .ocr-collapsible {
      display: none;
    }
    .ocr-collapsible.visible {
      display: flex;
    }
  </style>
</head>
<body>
  <div id="versionBadge" class="version-badge">v10</div>
  <main class="container">
    <h1>入札書PDF（指定様式）を業者別に比較</h1>
    <div class="row">
      <input id="fileInput" type="file" accept=".pdf" multiple />
    </div>
    <div class="row">
      <button id="startCameraBtn" type="button">カメラ開始</button>
      <button id="captureCameraBtn" type="button" disabled>撮影</button>
      <button id="stopCameraBtn" type="button" disabled>カメラ停止</button>
      <button id="copyBtn" type="button" disabled>抽出結果をコピー</button>
    </div>
    <div class="preview-section">
      <div class="preview-wrap preview-pane">
        <video id="cameraPreview" autoplay playsinline muted></video>
        <img id="filePreview" class="preview-image" alt="ファイルプレビュー" />
        <canvas id="capturePreview" class="preview-canvas"></canvas>
        <canvas id="overlayCanvas" class="overlay-canvas"></canvas>
      </div>
      <div id="previewTextWrap" class="preview-text-wrap">
        <div id="previewTextTitle" class="preview-text-title">連動テキスト（表示中ページ）</div>
        <pre id="previewSideText" class="preview-side-text">PDFを選択すると、この欄に同じページの抽出テキストを表示します。</pre>
      </div>
    </div>
    <div class="pager-row">
      <button id="prevPageBtn" type="button" disabled>◀ 前ページ</button>
      <span id="previewPageLabel" class="pager-label">- / -</span>
      <button id="nextPageBtn" type="button" disabled>次ページ ▶</button>
    </div>
    <div class="param-panel">
      <div class="row ocr-collapsible">
        <label>
          言語
          <select id="langSelect">
            <option value="jpn+eng" selected>日本語 + 英語</option>
            <option value="jpn">日本語のみ</option>
            <option value="eng">英語のみ</option>
          </select>
        </label>
        <label>
          PSM
          <select id="psmSelect">
            <option value="3" selected>3: 自動（デフォルト）</option>
            <option value="4">4: 単一段組テキスト</option>
            <option value="6">6: 単一ブロック</option>
            <option value="7">7: 単一行</option>
            <option value="11">11: ばらばらな文字</option>
          </select>
        </label>
        <label>
          OEM
          <select id="oemSelect">
            <option value="1" selected>1: LSTM（推奨）</option>
            <option value="3">3: 既定（自動）</option>
          </select>
        </label>
        <label>
          文字限定
          <input id="whitelistInput" type="text" placeholder="例: 0123456789" />
        </label>
      </div>
      <div class="row ocr-collapsible">
        <label>
          画像スケール
          <input id="scaleInput" type="range" min="1" max="4" value="1" step="0.5" />
          <span id="scaleValue">1x</span>
        </label>
        <label>
          コントラスト
          <input id="contrastInput" type="range" min="0" max="200" value="100" step="10" />
          <span id="contrastValue">100%</span>
        </label>
        <label>
          二値化（閾値）
          <input id="thresholdInput" type="range" min="0" max="255" value="128" step="10" />
          <span id="thresholdValue">128</span>
        </label>
        <label>
          ノイズ除去
          <input id="denoiseInput" type="checkbox" />
        </label>
        <label>
          傾斜補正（度）
          <input id="rotationInput" type="range" min="-45" max="45" value="0" step="1" />
          <span id="rotationValue">0°</span>
        </label>
        <label>
          文字高さしきい値
          <input id="charSizeInput" type="range" min="0" max="120" value="0" step="1" />
          <span id="charSizeValue">0px</span>
        </label>
        <label>
          自信度しきい値
          <input id="confidenceInput" type="range" min="0" max="100" value="0" step="1" />
          <span id="confidenceValue">0%</span>
        </label>
      </div>
      <div class="row ocr-collapsible">
        <button id="toggleOverlayBtn" type="button" disabled>オーバレイ表示</button>
        <button id="reOcrBtn" type="button" disabled>再OCR</button>
      </div>
      <div class="row">
        <button id="toggleOcrOptionsBtn" type="button">OCRオプションを表示</button>
        <button id="aiRefineBtn" type="button" disabled>AI連携（整形）</button>
        <button id="exportSummaryCsvBtn" type="button" disabled>サマリーCSV出力</button>
        <button id="exportDetailCsvBtn" type="button" disabled>明細CSV出力</button>
        <label>
          Gemini APIキー
          <input id="aiApiKeyInput" type="password" placeholder="AIza..." />
        </label>
      </div>
      <div class="row">
        <button id="viewListModeBtn" type="button" disabled>一覧</button>
        <button id="viewTextModeBtn" type="button" disabled>テキスト</button>
      </div>
    </div>
    <div id="status" class="status">指定様式のPDFを選択してAI連携を押すと、1PDF内の複数業者も含めて比較表を作成します。</div>
    <div class="progress-wrap">
      <progress id="progressBar" value="0" max="100"></progress>
      <div id="progressText" class="progress-text">待機中</div>
    </div>
    <div class="log-panel">
      <div id="quotaStatus" class="quota-status">有料枠残量: 取得不可（Gemini APIでは残量を直接取得できません）</div>
      <div id="apiLog" class="api-log">APIログ: まだ実行されていません。</div>
    </div>
    <div id="errorBox" class="error-box"></div>
    <textarea id="output" placeholder="ここに抽出結果が表示されます" readonly></textarea>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    const PDFJS_WORKER_SRC = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
    const fileInput = document.getElementById("fileInput");
    const startCameraBtn = document.getElementById("startCameraBtn");
    const captureCameraBtn = document.getElementById("captureCameraBtn");
    const stopCameraBtn = document.getElementById("stopCameraBtn");
    const cameraPreview = document.getElementById("cameraPreview");
    const filePreview = document.getElementById("filePreview");
    const capturePreview = document.getElementById("capturePreview");
    const overlayCanvas = document.getElementById("overlayCanvas");
    const previewTextWrap = document.getElementById("previewTextWrap");
    const previewTextTitle = document.getElementById("previewTextTitle");
    const previewSideText = document.getElementById("previewSideText");
    const prevPageBtn = document.getElementById("prevPageBtn");
    const nextPageBtn = document.getElementById("nextPageBtn");
    const previewPageLabel = document.getElementById("previewPageLabel");
    const copyBtn = document.getElementById("copyBtn");
    const toggleOverlayBtn = document.getElementById("toggleOverlayBtn");
    const reOcrBtn = document.getElementById("reOcrBtn");
    const toggleOcrOptionsBtn = document.getElementById("toggleOcrOptionsBtn");
    const aiRefineBtn = document.getElementById("aiRefineBtn");
    const exportSummaryCsvBtn = document.getElementById("exportSummaryCsvBtn");
    const exportDetailCsvBtn = document.getElementById("exportDetailCsvBtn");
    const viewListModeBtn = document.getElementById("viewListModeBtn");
    const viewTextModeBtn = document.getElementById("viewTextModeBtn");
    const aiApiKeyInput = document.getElementById("aiApiKeyInput");
    const status = document.getElementById("status");
    const output = document.getElementById("output");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");
    const quotaStatus = document.getElementById("quotaStatus");
    const apiLog = document.getElementById("apiLog");
    const errorBox = document.getElementById("errorBox");
    const versionBadge = document.getElementById("versionBadge");
    const langSelect = document.getElementById("langSelect");
    const psmSelect = document.getElementById("psmSelect");
    const oemSelect = document.getElementById("oemSelect");
    const whitelistInput = document.getElementById("whitelistInput");
    const scaleInput = document.getElementById("scaleInput");
    const scaleValue = document.getElementById("scaleValue");
    const contrastInput = document.getElementById("contrastInput");
    const contrastValue = document.getElementById("contrastValue");
    const thresholdInput = document.getElementById("thresholdInput");
    const thresholdValue = document.getElementById("thresholdValue");
    const denoiseInput = document.getElementById("denoiseInput");
    const rotationInput = document.getElementById("rotationInput");
    const rotationValue = document.getElementById("rotationValue");
    const charSizeInput = document.getElementById("charSizeInput");
    const charSizeValue = document.getElementById("charSizeValue");
    const confidenceInput = document.getElementById("confidenceInput");
    const confidenceValue = document.getElementById("confidenceValue");
    const APP_VERSION = "v10";
    const BATCH_SOURCE_TEXT_MAX_CHARS = 7000;
    const MISSING_UNIT_PRICE_TEXT = "‐";

    let selectedFile = null;
    let selectedPdfFiles = [];
    let mediaStream = null;
    let isProcessing = false;
    let lastOcrSource = null;
    let lastOcrType = "";
    let lastImageData = null;
    let overlayVisible = false;
    let lastOverlayData = null;
    let apiQuotaLimited = false;
    let lastComparisonData = null;
    let ocrOptionsVisible = false;
    let comparisonViewMode = "list";
    let previewPdfDoc = null;
    let previewPdfPageCount = 0;
    let previewPdfCurrentPage = 1;
    let previewPageTextCache = new Map();
    let previewGeminiPageTextMap = {};
    let previewPdfFileName = "";

    const apiStats = {
      success: 0,
      failed: 0,
      lastModel: "-",
      lastError: "-"
    };

    function appendApiLog(message) {
      const time = new Date().toLocaleTimeString("ja-JP", { hour12: false });
      if (!apiLog.dataset.hasLogs) {
        apiLog.textContent = "";
        apiLog.dataset.hasLogs = "1";
      }
      apiLog.textContent = `[${time}] ${message}\n${apiLog.textContent}`;
    }

    function updateQuotaStatus() {
      const quotaText = apiQuotaLimited
        ? "有料枠残量: 上限到達の可能性あり（無料枠/レート制限）"
        : "有料枠残量: 取得不可（Gemini APIでは残量を直接取得できません）";
      quotaStatus.textContent = `${quotaText} | 成功:${apiStats.success} 失敗:${apiStats.failed} 最終モデル:${apiStats.lastModel}`;
    }

    function updateAiButtonState() {
      const hasBatchPdfSource = selectedPdfFiles.length > 0;
      const hasLegacySource = (lastOcrType === "image" || lastOcrType === "camera" || lastOcrType === "pdf") && Boolean(lastOcrSource);
      const hasSource = hasBatchPdfSource || hasLegacySource;
      const hasKey = Boolean(aiApiKeyInput.value && aiApiKeyInput.value.trim().length > 0);
      aiRefineBtn.disabled = !hasSource || !hasKey || isProcessing;
    }

    function setExportButtonsState(enabled) {
      exportSummaryCsvBtn.disabled = !enabled;
      exportDetailCsvBtn.disabled = !enabled;
      updateComparisonModeButtons();
    }

    function updateComparisonModeButtons() {
      const hasComparison = Boolean(lastComparisonData);
      if (!hasComparison) {
        viewListModeBtn.disabled = true;
        viewTextModeBtn.disabled = true;
        return;
      }
      viewListModeBtn.disabled = comparisonViewMode === "list";
      viewTextModeBtn.disabled = comparisonViewMode === "text";
    }

    function buildComparisonCsvLikeText(comparisonData) {
      if (!comparisonData || !comparisonData.vendorCount) {
        return "比較対象データがありません。";
      }

      const rawText = String(comparisonData.rawExtractedText || "").trim();
      if (rawText) {
        return rawText;
      }

      const header = ["連番", "品目", ...comparisonData.vendorNames];
      const lines = [header.join(",")];

      for (const row of comparisonData.detailRows) {
        const itemLabel = row.spec && row.spec !== "-"
          ? `${row.itemName}（${row.spec}）`
          : row.itemName;
        const sequenceLabel = row.sequence || "-";
        const cells = comparisonData.vendorNames.map((name) => {
          const value = row.unitPricesByVendor?.[name];
          return Number.isFinite(value) ? String(value) : MISSING_UNIT_PRICE_TEXT;
        });
        lines.push([sequenceLabel, itemLabel, ...cells].join(","));
      }

      return lines.join("\n");
    }

    function renderComparisonOutput() {
      if (!lastComparisonData) {
        return;
      }
      output.value = comparisonViewMode === "text"
        ? buildComparisonCsvLikeText(lastComparisonData)
        : buildComparisonReport(lastComparisonData);
      copyBtn.disabled = output.value.length === 0;
      updateComparisonModeButtons();
    }

    function setComparisonViewMode(mode) {
      if (!["list", "text"].includes(mode)) {
        return;
      }
      comparisonViewMode = mode;
      renderComparisonOutput();
    }

    function updateOcrOptionsVisibility() {
      const sections = document.querySelectorAll(".ocr-collapsible");
      sections.forEach((section) => {
        section.classList.toggle("visible", ocrOptionsVisible);
      });
      toggleOcrOptionsBtn.textContent = ocrOptionsVisible
        ? "OCRオプションを閉じる"
        : "OCRオプションを表示";
    }

    versionBadge.textContent = APP_VERSION;

    scaleInput.addEventListener("input", () => {
      scaleValue.textContent = `${scaleInput.value}x`;
    });
    contrastInput.addEventListener("input", () => {
      contrastValue.textContent = `${contrastInput.value}%`;
    });
    thresholdInput.addEventListener("input", () => {
      thresholdValue.textContent = thresholdInput.value;
    });
    rotationInput.addEventListener("input", () => {
      rotationValue.textContent = `${rotationInput.value}°`;
    });
    charSizeInput.addEventListener("input", () => {
      charSizeValue.textContent = `${charSizeInput.value}px`;
      if (overlayVisible) drawOverlay();
    });
    confidenceInput.addEventListener("input", () => {
      confidenceValue.textContent = `${confidenceInput.value}%`;
      if (overlayVisible) drawOverlay();
    });
    aiApiKeyInput.addEventListener("input", updateAiButtonState);

    if (window.pdfjsLib?.GlobalWorkerOptions) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER_SRC;
    }

    function hideAllPreviews() {
      cameraPreview.style.display = "none";
      filePreview.style.display = "none";
      capturePreview.style.display = "none";
      overlayCanvas.style.display = "none";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&apos;");
    }

    function highlightPreviewNumericTokens(text) {
      const escaped = escapeHtml(text);
      return escaped.replace(
        /([+＋-－]?(?:[0-9０-９]{1,3}(?:[,，][0-9０-９]{3})+|[0-9０-９]+)(?:[.．][0-9０-９]+)?)/g,
        (token) => {
          const digitsOnly = token.replace(/[^0-9０-９]/g, "");
          const hasCommaGroup = /[0-9０-９]{1,3}[,，][0-9０-９]{3}/.test(token);
          const isPriceLike = hasCommaGroup || digitsOnly.length >= 3;
          return isPriceLike ? `<span class="preview-number-mark">${token}</span>` : token;
        }
      );
    }

    function parseFixedBidTableRows(text) {
      const normalized = String(text || "").trim();
      if (!normalized) {
        return null;
      }

      const lines = normalized
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter((line) => line.length > 0);
      if (!lines.length) {
        return null;
      }

      const itemHeaderIndex = lines.findIndex((line) => /連番/.test(line) && /品名/.test(line));
      if (itemHeaderIndex < 0) {
        return null;
      }

      const unitQtyHeaderIndex = lines.findIndex((line, idx) => idx > itemHeaderIndex && /単位/.test(line) && /予定数量/.test(line));
      const priceHeaderIndex = lines.findIndex((line, idx) => idx > itemHeaderIndex && /^単価$/.test(line));
      if (unitQtyHeaderIndex < 0 || priceHeaderIndex < 0 || unitQtyHeaderIndex >= priceHeaderIndex) {
        return null;
      }

      const items = [];
      for (let i = itemHeaderIndex + 1; i < unitQtyHeaderIndex; i++) {
        const line = lines[i];
        const matched = line.match(/^(\d{1,3})\s+(.+)$/);
        if (!matched) {
          continue;
        }
        items.push({ sequence: matched[1], itemName: matched[2].trim() });
      }
      if (!items.length) {
        return null;
      }

      const unitQtyBlock = lines.slice(unitQtyHeaderIndex + 1, priceHeaderIndex);
      const units = [];
      const quantities = [];
      for (const token of unitQtyBlock) {
        const num = parseLooseNumber(token);
        if (Number.isFinite(num) && /[0-9０-９]/.test(token)) {
          quantities.push(token);
        } else {
          units.push(token);
        }
      }

      const prices = [];
      for (let i = priceHeaderIndex + 1; i < lines.length; i++) {
        const token = lines[i];
        const num = parseLooseNumber(token);
        if (Number.isFinite(num) && /[0-9０-９]/.test(token)) {
          prices.push(token);
          continue;
        }
        if (prices.length > 0) {
          break;
        }
      }

      const rows = items.map((item, idx) => ({
        sequence: item.sequence,
        itemName: item.itemName,
        unit: units[idx] || "",
        quantity: quantities[idx] || "",
        unitPriceRaw: prices[idx] || ""
      }));

      const prefixLines = lines.slice(0, itemHeaderIndex);
      return { prefixLines, rows };
    }

    function formatLinkedTableText(text) {
      const normalized = String(text || "").trim();
      if (!normalized) {
        return "";
      }

      const fixedTable = parseFixedBidTableRows(normalized);
      if (fixedTable?.rows?.length) {
        const rowLines = fixedTable.rows.map((row) => {
          const unitLabel = row.unit || "-";
          const quantityLabel = row.quantity || "-";
          const unitPriceLabel = row.unitPriceRaw || MISSING_UNIT_PRICE_TEXT;
          return `${row.sequence} ${row.itemName} ${unitLabel} ${quantityLabel} ${unitPriceLabel}`.trim();
        });

        const mergedLines = [
          ...(fixedTable.prefixLines || []),
          "連番 品名 単位 予定数量 単価",
          ...rowLines
        ].filter((line) => String(line || "").trim().length > 0);
        return mergedLines.join("\n").trim();
      }

      const lines = normalized
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter((line) => line.length > 0);

      if (!lines.length) {
        return normalized;
      }

      const headers = ["品名", "単位", "予定数量", "単価"];
      const outputHeaders = ["連番", ...headers];
      const headerIndexes = headers.map((header) => lines.indexOf(header));
      const hasHeaderBlock = headerIndexes.every((index) => index >= 0)
        && headerIndexes.slice(1).every((index, i) => index > headerIndexes[i]);

      if (!hasHeaderBlock) {
        return normalized;
      }

      const headerStart = Math.min(...headerIndexes);
      const headerEnd = Math.max(...headerIndexes);
      const prefix = lines.slice(0, headerStart);
      const body = lines.slice(headerEnd + 1);
      if (body.length < 2) {
        return normalized;
      }

      const sequenceIndexes = [];
      let lastSequenceNumber = null;
      const MAX_SEQUENCE_NUMBER = 300;
      for (let index = 0; index < body.length; index++) {
        const value = body[index];
        if (!/^\d+$/.test(value)) {
          continue;
        }

        const num = Number(value);
        if (!Number.isFinite(num) || num <= 0 || num > MAX_SEQUENCE_NUMBER) {
          continue;
        }

        const isFirst = lastSequenceNumber === null;
        const isNextLikelySequence = !isFirst && num > lastSequenceNumber && num <= (lastSequenceNumber + 5);
        if (isFirst || isNextLikelySequence) {
          sequenceIndexes.push(index);
          lastSequenceNumber = num;
        }
      }

      if (!sequenceIndexes.length) {
        return normalized;
      }

      const rowLines = [];
      for (let i = 0; i < sequenceIndexes.length; i++) {
        const start = sequenceIndexes[i];
        const end = i + 1 < sequenceIndexes.length ? sequenceIndexes[i + 1] : body.length;
        const chunk = body.slice(start, end).filter((value) => String(value || "").trim().length > 0);
        if (!chunk.length) {
          continue;
        }
        const seq = chunk[0];
        const values = chunk.slice(1);
        const rowText = values.length ? `${seq} ${values.join(" ")}` : seq;
        rowLines.push(rowText.trim());
      }

      if (!rowLines.length) {
        return normalized;
      }

      const mergedLines = [
        ...prefix,
        outputHeaders.join(" "),
        ...rowLines
      ].filter((line) => String(line || "").trim().length > 0);
      return mergedLines.join("\n").trim();
    }

    function parsePageTextMap(rawText) {
      const text = String(rawText || "");
      if (!text.trim()) {
        return {};
      }
      const map = {};
      const regex = /---\s*Page\s*(\d+)\s*---\s*([\s\S]*?)(?=(?:\n\s*---\s*Page\s*\d+\s*---)|$)/gi;
      let hasMatch = false;
      let match;
      while ((match = regex.exec(text)) !== null) {
        hasMatch = true;
        const pageNumber = Number(match[1]);
        map[pageNumber] = String(match[2] || "").trim();
      }
      if (!hasMatch) {
        map[1] = text.trim();
      }
      return map;
    }

      prevPageBtn.disabled = previewPdfCurrentPage <= 1;

      const geminiPageKeys = Object.keys(previewGeminiPageTextMap || {})

      const hasPageSplitGeminiText = geminiPageKeys.length >= 2
        || (geminiPageKeys.length === 1 && (previewPdfPageCount || 0) <= 1);
      const geminiText = hasPageSplitGeminiText
        ? previewGeminiPageTextMap[pageNumber]

          previewPageTextCache.set(pageNumber, "");

      const pageText = String(previewPageTextCache.get(pageNumber) || "").trim();
      const geminiFullText = String(previewGeminiPageTextMap?.[1] || "").trim();

      if (!previewPdfDoc) {

      const safePage = Math.max(1, Math.min(previewPdfPageCount, Number(pageNumber) || 1));
      const targetPage = await previewPdfDoc.getPage(safePage);
      const baseViewport = targetPage.getViewport({ scale: 1 });
      const maxPreviewWidth = 900;
      const scale = baseViewport.width > 0
        ? Math.min(2, Math.max(0.75, maxPreviewWidth / baseViewport.width))
        : 1;
      const viewport = targetPage.getViewport({ scale });

      const canvas = document.createElement("canvas");
      canvas.width = Math.ceil(viewport.width);
      canvas.height = Math.ceil(viewport.height);
      const context = canvas.getContext("2d");
      await targetPage.render({ canvasContext: context, viewport }).promise;
      previewPdfCurrentPage = safePage;
      showCanvasPreview(canvas);
      updatePdfPagerButtons();
      await updatePreviewSideTextByPage(safePage);

    function isLowQualityAiResult(aiText, sourceText) {
      const ai = String(aiText || "").trim();
      if (!ai) {
        return true;
      }

      const unreadableMatches = ai.match(/\[判読不能\]/g) || [];
      const unreadableCount = unreadableMatches.length;
      const withoutUnreadable = ai.replace(/\[判読不能\]/g, "").replace(/\s+/g, "");
      if (!withoutUnreadable) {
        return true;
      }

      const source = String(sourceText || "").replace(/\s+/g, "");
      if (source.length >= 20) {
        const minUsefulLength = Math.max(10, Math.floor(source.length * 0.15));
        if (withoutUnreadable.length < minUsefulLength) {
          return true;
        }
      }

      if (unreadableCount >= 2) {
        const approxUnreadableChars = unreadableCount * 6;
        if (approxUnreadableChars >= Math.floor(ai.length * 0.6)) {
          return true;
        }
      }

      return false;
    }

    function scaleSize(width, height, maxSide = 1600) {
      const longest = Math.max(width, height);
      if (longest <= maxSide) return { width, height };
      const ratio = maxSide / longest;
      return {
        width: Math.max(1, Math.round(width * ratio)),
        height: Math.max(1, Math.round(height * ratio))
      };
    }

    function canvasToJpegBase64(canvas, quality = 0.85) {
      const dataUrl = canvas.toDataURL("image/jpeg", quality);
      return dataUrl.split(",")[1] || "";
    }

    async function fileToImageBitmap(file) {
      try {
        return await createImageBitmap(file);
      } catch {
        const dataUrl = await fileToDataUrl(file);
        return await new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error("画像の読み込みに失敗しました。"));
          img.src = dataUrl;
        });
      }
    }

    function drawScaledToCanvas(source, width, height) {
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(source, 0, 0, width, height);
      return canvas;
    }

    async function fileToDataUrl(file) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("画像の読み込みに失敗しました。"));
        reader.readAsDataURL(file);
      });
    }

    async function getAiImagePart() {
      if (lastOcrType === "camera" && lastImageData?.canvas) {
        const srcCanvas = lastImageData.canvas;
        const scaled = scaleSize(srcCanvas.width, srcCanvas.height, 1600);
        const resizedCanvas = drawScaledToCanvas(srcCanvas, scaled.width, scaled.height);
        const base64 = canvasToJpegBase64(resizedCanvas);
        if (!base64) throw new Error("カメラ画像の変換に失敗しました。");
        return {
          inline_data: {
            mime_type: "image/jpeg",
            data: base64
          }
        };
      }

      if (lastOcrType === "image" && lastOcrSource instanceof File) {
        const imageSource = await fileToImageBitmap(lastOcrSource);
        const sourceWidth = imageSource.width || imageSource.naturalWidth || 0;
        const sourceHeight = imageSource.height || imageSource.naturalHeight || 0;
        const scaled = scaleSize(sourceWidth, sourceHeight, 1600);
        const resizedCanvas = drawScaledToCanvas(imageSource, scaled.width, scaled.height);
        if (typeof imageSource.close === "function") {
          imageSource.close();
        }
        const base64 = canvasToJpegBase64(resizedCanvas);
        if (!base64) throw new Error("画像ファイルの変換に失敗しました。");
        return {
          inline_data: {
            mime_type: "image/jpeg",
            data: base64
          }
        };
      }

      if (lastOcrType === "pdf" && lastImageData?.canvas) {
        const srcCanvas = lastImageData.canvas;
        const scaled = scaleSize(srcCanvas.width, srcCanvas.height, 1600);
        const resizedCanvas = drawScaledToCanvas(srcCanvas, scaled.width, scaled.height);
        const base64 = canvasToJpegBase64(resizedCanvas);
        if (!base64) throw new Error("PDFプレビュー画像の変換に失敗しました。");
        return {
          inline_data: {
            mime_type: "image/jpeg",
            data: base64
          }
        };
      }

      throw new Error("AI連携用の画像がありません。画像またはカメラでOCRを実行してください。");
    }

    function extractGeminiErrorMessage(responseJson) {
      const message = responseJson?.error?.message;
      if (!message) return "Gemini APIエラーが発生しました。";
      if (/API key not valid|invalid api key/i.test(message)) {
        return "APIキーが無効です。キーを確認してください。";
      }
      if (/PERMISSION_DENIED|API has not been used|not enabled/i.test(message)) {
        return "API利用権限がありません。Generative Language APIの有効化とキー制限設定を確認してください。";
      }
      if (/quota|rate limit|RESOURCE_EXHAUSTED/i.test(message)) {
        apiQuotaLimited = true;
        return "無料枠またはレート制限に達しました。時間を置いて再実行してください。";
      }
      if (/high demand|overloaded|temporarily unavailable|try again later/i.test(message)) {
        return "Geminiの混雑により一時的に失敗しました。少し時間を置いて再実行してください。";
      }
      if (/payload|too large|request entity too large/i.test(message)) {
        return "送信画像サイズが大きすぎる可能性があります。より小さい画像で再試行してください。";
      }
      return message;
    }

    function isTransientGeminiError(error) {
      const status = Number(error?.status || 0);
      const message = String(error?.message || "");
      if ([408, 409, 429, 500, 502, 503, 504].includes(status)) {
        return true;
      }
      return /high demand|overloaded|temporarily unavailable|try again later|rate limit|timeout|failed to fetch|networkerror|load failed/i.test(message);
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function callGeminiWithModel(modelName, apiKey, parts) {
      appendApiLog(`Gemini呼び出し開始: ${modelName}`);
      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${encodeURIComponent(apiKey)}`;
      let response;
      try {
        response = await fetch(endpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            contents: [{
              parts
            }],
            generationConfig: {
              temperature: 0.2
            }
          })
        });
      } catch (fetchError) {
        const err = new Error("Gemini APIへ接続できませんでした。ネットワーク接続・VPN・プロキシ・ブラウザ拡張の通信ブロックを確認してください。");
        err.status = 0;
        appendApiLog(`失敗: ${modelName} (network) ${fetchError?.message || fetchError}`);
        throw err;
      }

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        const err = new Error(extractGeminiErrorMessage(data));
        err.status = response.status;
        appendApiLog(`失敗: ${modelName} (${response.status}) ${err.message}`);
        throw err;
      }
      appendApiLog(`成功: ${modelName}`);
      return data;
    }

    async function callGeminiWithRetry(modelName, apiKey, parts) {
      const retryDelays = [700, 1600, 3000];
      let lastError = null;

      for (let attempt = 0; attempt <= retryDelays.length; attempt++) {
        try {
          if (attempt > 0) {
            appendApiLog(`再試行: ${modelName} (${attempt}/${retryDelays.length})`);
          }
          return await callGeminiWithModel(modelName, apiKey, parts);
        } catch (error) {
          lastError = error;
          if (!isTransientGeminiError(error) || attempt === retryDelays.length) {
            throw error;
          }
          await sleep(retryDelays[attempt]);
        }
      }

      throw lastError || new Error("Gemini APIエラーが発生しました。");
    }

    async function analyzeImageWithGemini(apiKey) {
      const imagePart = await getAiImagePart();
      const parts = [

        "gemini-2.5-flash-lite",
        "gemini-2.5-flash",
        "gemini-2.0-flash"

      let data = null;
      let lastError = null;
      for (const model of modelCandidates) {
        try {
          data = await callGeminiWithRetry(model, apiKey, parts);
          apiStats.lastModel = model;
          break;
        } catch (error) {
          lastError = error;
          apiStats.lastError = error?.message || "unknown";
          if (![400, 404].includes(error?.status) && !isTransientGeminiError(error)) {
            throw error;
          }
        }
      }
      if (!data) {
        throw lastError || new Error("利用可能なGeminiモデルで解析できませんでした。");

      const refined = (data?.candidates ?? [])
        .flatMap((candidate) => candidate?.content?.parts ?? [])
        .map((part) => part?.text ?? "")
        .join("\n")
        .trim();

      if (!refined) {
        throw new Error("AIの応答が空でした。もう一度お試しください。");
      }

      return refined;
    }

    async function analyzePdfWithGemini(apiKey, file) {
      if (!window.pdfjsLib?.getDocument) {
        throw new Error("PDF.jsの読み込みに失敗しました。通信環境を確認してください。");
      }
      const data = await file.arrayBuffer();
      const loadingTask = window.pdfjsLib.getDocument({ data });
      const pdf = await loadingTask.promise;
      const maxPages = Math.min(pdf.numPages, 50);
      const parts = [{
        text: [
          "あなたはOCRアシスタントです。",
          `対象はPDF全${maxPages}ページです。`,
          "目的: 各ページの日本語テキストをできるだけ忠実に抽出してください。",
          "出力形式: ページ順に、各ページの先頭に `--- Page N ---` を付けること。",
          "数値・日付・金額・記号は可能な限り保持し、説明や注釈は不要です。"
        ].join("\n")
      }];

      for (let pageNum = 1; pageNum <= maxPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 2 });
        const pageCanvas = document.createElement("canvas");
        pageCanvas.width = Math.ceil(viewport.width);
        pageCanvas.height = Math.ceil(viewport.height);
        const pageContext = pageCanvas.getContext("2d");
        await page.render({ canvasContext: pageContext, viewport }).promise;

        if (pageNum === 1) {
          showCanvasPreview(pageCanvas);
        }

        const scaled = scaleSize(pageCanvas.width, pageCanvas.height, 1600);
        const resizedCanvas = drawScaledToCanvas(pageCanvas, scaled.width, scaled.height);
        const base64 = canvasToJpegBase64(resizedCanvas);
        if (!base64) {
          continue;
        }

        parts.push({ inline_data: { mime_type: "image/jpeg", data: base64 } });
        setProgress((pageNum / maxPages) * 100, `Gemini送信用にPDFを準備中... ${pageNum}/${maxPages}ページ`);
      }

      if (parts.length <= 1) {
        throw new Error("PDF解析結果が空でした。");
      }

      const modelCandidates = ["gemini-2.5-flash-lite", "gemini-2.5-flash", "gemini-2.0-flash"];
      let dataResult = null;
      let lastError = null;
      for (const model of modelCandidates) {
        try {
          dataResult = await callGeminiWithRetry(model, apiKey, parts);
          apiStats.lastModel = model;
          break;
        } catch (error) {
          lastError = error;
          apiStats.lastError = error?.message || "unknown";
          if (![400, 404].includes(error?.status) && !isTransientGeminiError(error)) {
            throw error;
          }
        }
      }
      if (!dataResult) {
        throw lastError || new Error("利用可能なGeminiモデルで解析できませんでした。");
      }

      const extracted = (dataResult?.candidates ?? [])
        .flatMap((candidate) => candidate?.content?.parts ?? [])
        .map((part) => part?.text ?? "")
        .join("\n")
        .trim();

      if (!extracted) {
        throw new Error("PDF解析結果が空でした。");
      }
      updatePreviewGeminiText(extracted, file?.name || "");
      return extracted;
    }

    function parseJsonFromText(text) {
      const raw = String(text || "").trim();
      if (!raw) return null;
      try {
        return JSON.parse(raw);
      } catch {}

      const fenced = raw.match(/```(?:json)?\s*([\s\S]*?)\s*```/i);
      if (fenced?.[1]) {
        try {
          return JSON.parse(fenced[1]);
        } catch {}
      }

      const first = raw.indexOf("{");
      const last = raw.lastIndexOf("}");
      if (first >= 0 && last > first) {
        try {
          return JSON.parse(raw.slice(first, last + 1));
        } catch {}
      }

      const firstArray = raw.indexOf("[");
      const lastArray = raw.lastIndexOf("]");
      if (firstArray >= 0 && lastArray > firstArray) {
        try {
          return JSON.parse(raw.slice(firstArray, lastArray + 1));
        } catch {}
      }
      return null;
    }

    function parseLooseNumber(value) {
      if (typeof value === "number" && Number.isFinite(value)) {
        return value;
      }
      const raw = String(value ?? "")
        .replace(/[０-９]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/[－ー―]/g, "-")
        .replace(/[＋]/g, "+")
        .replace(/[，]/g, ",")
        .replace(/[．]/g, ".")
        .replace(/[（]/g, "(")
        .replace(/[）]/g, ")")
        .replace(/[△▲]/g, "-")
        .trim();

      const isParenthesizedNegative = /^\(.*\)$/.test(raw);
      const normalized = raw
        .replace(/[￥¥,\s]/g, "")
        .replace(/円|税抜|税込|外税|内税/g, "")
        .replace(/[^0-9.+-]/g, "");
      if (!normalized) return null;
      const num = Number(isParenthesizedNegative ? `-${normalized.replace(/[()]/g, "")}` : normalized);
      return Number.isFinite(num) ? num : null;
    }

    function parseQuantityNumber(value) {
      const num = parseLooseNumber(value);
      if (Number.isFinite(num) && num >= 0) {
        return num;
      }
      return null;
    }

    function normalizeVendorName(name, fallbackName) {
      const value = String(name || "").trim();
      if (value) return value;
      return String(fallbackName || "").replace(/\.pdf$/i, "").trim() || "業者名不明";
    }

    function normalizeMatchText(value) {
      return String(value ?? "")
        .replace(/[０-９]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/[－ー―]/g, "-")
        .replace(/[，]/g, ",")
        .replace(/[．]/g, ".")
        .replace(/[￥¥]/g, "")
        .replace(/円|税抜|税込|外税|内税/g, "")
        .replace(/\s+/g, "")
        .trim();
    }

    function hasNumericToken(value) {
      return /[0-9０-９]/.test(String(value ?? ""));
    }

    function normalizeLineItem(item, sourceText = "") {
      const row = item && typeof item === "object" ? item : {};
      const sequence = String(
        row.sequence
        ?? row.serial
        ?? row.no
        ?? row.number
        ?? row.lineNo
        ?? ""
      )
        .replace(/[０-９]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/[^0-9]/g, "")
        .trim();
      const itemName = String(row.itemName ?? row.name ?? "").trim();
      const spec = String(row.spec ?? row.standard ?? "").trim();
      const quantity = row.quantity
        ?? row.qty
        ?? row.plannedQuantity
        ?? row.scheduledQuantity
        ?? row.expectedQuantity
        ?? "";
      const unit = String(row.unit ?? "").trim();
      const parsedUnitPrice = parseLooseNumber(
        row.unitPrice
        ?? row.handwrittenUnitPrice
        ?? row.unitPriceExclTax
        ?? row.priceExclTax
        ?? null
      );
      const unitPriceRaw = String(
        row.unitPriceRaw
        ?? row.handwrittenUnitPriceRaw
        ?? row.unitPriceEvidence
        ?? row.unitPriceText
        ?? ""
      ).trim();
      const normalizedSource = normalizeMatchText(sourceText);
      const normalizedUnitPriceRaw = normalizeMatchText(unitPriceRaw);
      const isEvidenceMatched = Boolean(
        normalizedUnitPriceRaw
        && hasNumericToken(unitPriceRaw)
        && normalizedSource.includes(normalizedUnitPriceRaw)
      );
      const unitPrice = Number.isFinite(parsedUnitPrice) && isEvidenceMatched
        ? parsedUnitPrice
        : null;
      const parsedAmount = parseLooseNumber(
        row.amount
        ?? row.total
        ?? row.amountExclTax
        ?? row.subtotalExclTax
        ?? null
      );
      const quantityNum = parseQuantityNumber(quantity);
      const amount = Number.isFinite(parsedAmount)
        ? parsedAmount
        : (Number.isFinite(unitPrice) && Number.isFinite(quantityNum)
          ? unitPrice * quantityNum
          : (Number.isFinite(unitPrice) ? unitPrice : null));
      const key = `${itemName}｜${spec}`.trim();
      return {
        key,
        sequence,
        itemName,
        spec,
        quantity,
        unit,
        unitPrice,
        amount
      };
    }

        ].join("\n")

      let renderedPageCount = 0;
      let totalPageCount = 0;
      const loadedPdfs = [];

      for (const file of targetFiles) {
        const data = await file.arrayBuffer();
        const loadingTask = window.pdfjsLib.getDocument({ data });
        const pdf = await loadingTask.promise;
        loadedPdfs.push({ file, pdf });

        throw new Error("PDF解析入力が空でした。");
      }

      const strictModel = "gemini-2.5-flash";
      let data = null;
      try {
        data = await callGeminiWithModel(strictModel, apiKey, parts);
        apiStats.lastModel = strictModel;
      } catch (error) {
        apiStats.lastError = error?.message || "unknown";
        throw error;
      }

      const text = (data?.candidates ?? [])
        .flatMap((candidate) => candidate?.content?.parts ?? [])
        .map((part) => part?.text ?? "")
        .join("\n")
        .trim();

      const parsed = parseJsonFromText(text);
      let filesResult = Array.isArray(parsed?.files) ? parsed.files : [];

      const extractFilesArrayJsonText = (sourceText) => {
        const source = String(sourceText || "");
        const keyMatch = /"files"\s*:/i.exec(source);
        if (!keyMatch) {
          return "";
        }
        const keyIndex = keyMatch.index + keyMatch[0].length;
        const start = source.indexOf("[", keyIndex);
        if (start < 0) {
          return "";
        }
        let depth = 0;
        let inString = false;
        let escaped = false;
        for (let i = start; i < source.length; i++) {
          const ch = source[i];
          if (escaped) {
            escaped = false;
            continue;
          }
          if (ch === "\\") {
            escaped = true;
            continue;
          }
          if (ch === '"') {
            inString = !inString;
            continue;
          }
          if (inString) {
            continue;
          }
          if (ch === "[") {
            depth += 1;
          } else if (ch === "]") {
            depth -= 1;
            if (depth === 0) {
              return source.slice(start, i + 1);
            }
          }
        }
        return "";
      };

      if (!filesResult.length) {
        const filesArrayJson = extractFilesArrayJsonText(text);
        if (filesArrayJson) {
          try {
            const arrayParsed = JSON.parse(filesArrayJson);
            if (Array.isArray(arrayParsed)) {
              filesResult = arrayParsed;
            }
          } catch {}
        }
      }

      if (!filesResult.length && Array.isArray(parsed)) {
        filesResult = parsed;
      }

      if (!filesResult.length && parsed && typeof parsed === "object") {
        const parsedVendors = Array.isArray(parsed?.vendors) ? parsed.vendors : [];
        if (parsedVendors.length && targetFiles.length === 1) {
          filesResult = [{
            fileName: targetFiles[0].name,
            rawExtractedText: String(parsed?.rawExtractedText || "").trim(),
            vendors: parsedVendors
          }];
        }
      }

      if (!filesResult.length && targetFiles.length > 0) {
        filesResult = targetFiles.map((file) => ({
          fileName: file.name,
          rawExtractedText: "",
          vendors: []
        }));
      }

      if (!filesResult.length) {
        throw new Error("直接構造化抽出JSONの解析に失敗しました。");
      }

      return filesResult;
    }

    async function extractPdfTextWithLocalOcr(file, fileIndex, totalFiles) {
      if (!window.pdfjsLib?.getDocument) {
        throw new Error("PDF.jsの読み込みに失敗しました。通信環境を確認してください。");
      }
      if (!window.Tesseract?.recognize) {
        throw new Error("Tesseract.jsの読み込みに失敗しました。通信環境を確認してください。");
      }

      const data = await file.arrayBuffer();
      const loadingTask = window.pdfjsLib.getDocument({ data });
      const pdf = await loadingTask.promise;
      const renderScale = Math.min(4, Math.max(2.5, (parseFloat(scaleInput.value) || 1) * 2.4));
      let allText = "";

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: renderScale });
        const pageCanvas = document.createElement("canvas");
        pageCanvas.width = Math.ceil(viewport.width);
        pageCanvas.height = Math.ceil(viewport.height);
        const pageContext = pageCanvas.getContext("2d");
        await page.render({ canvasContext: pageContext, viewport }).promise;

        if (fileIndex === 0 && pageNum === 1) {
          showCanvasPreview(pageCanvas);
        }

        const enhancedCanvas = applyImageEnhancements(pageCanvas);
        const psmCandidates = ["6", "4", "11"];
        let bestText = "";
        let bestScore = -Infinity;

        for (const psm of psmCandidates) {
          const result = await recognizeWithProgressCustom(
            enhancedCanvas,
            `PDF OCR中... (${fileIndex + 1}/${totalFiles}件 ${pageNum}/${pdf.numPages}ページ / PSM ${psm})`,
            { psm }
          );
          const candidateText = normalizeJapaneseSpacing(String(result?.data?.text || ""));
          const candidateScore = scoreOcrText(candidateText);
          if (candidateScore > bestScore) {
            bestScore = candidateScore;
            bestText = candidateText;
          }
        }

        allText += `--- Page ${pageNum} ---\n${bestText.trim()}\n\n`;
      }

      return allText.trim();
    }

    function buildComparisonData(vendors) {
      const rows = vendors.map((vendor) => {
        const lineItems = Array.isArray(vendor.lineItems) ? vendor.lineItems : [];
        const amountValues = lineItems
          .map((item) => parseLooseNumber(item.amount))
          .filter((value) => Number.isFinite(value));
        const totalLineItemCount = lineItems.length;
        const amountItemCount = amountValues.length;
        const missingAmountCount = Math.max(0, totalLineItemCount - amountItemCount);
        const amountReadRate = totalLineItemCount > 0
          ? Math.round((amountItemCount / totalLineItemCount) * 100)
          : 0;
        const subtotalExclTax = amountValues.length
          ? amountValues.reduce((sum, value) => sum + value, 0)
          : null;
        return {
          ...vendor,
          lineItems,
          subtotalExclTax,
          totalLineItemCount,
          amountItemCount,
          missingAmountCount,
          amountReadRate
        };
      });

      const validTotals = rows
        .map((row) => row.subtotalExclTax)
        .filter((value) => Number.isFinite(value));
      const minTotal = validTotals.length ? Math.min(...validTotals) : null;

      const summaryRows = [];

      for (const row of rows) {
        const isLowest = Number.isFinite(row.subtotalExclTax) && minTotal !== null && row.subtotalExclTax === minTotal;
        summaryRows.push({
          vendorName: row.vendorName || "-",
          subtotalExclTax: Number.isFinite(row.subtotalExclTax) ? row.subtotalExclTax : null,
          totalLineItemCount: row.totalLineItemCount,
          amountItemCount: row.amountItemCount,
          missingAmountCount: row.missingAmountCount,
          amountReadRate: row.amountReadRate,
          isLowest
        });
      }

      const vendorNames = rows.map((row) => row.vendorName || "業者");
      const itemMap = new Map();
      const fallbackKeyToRowKey = new Map();
      let unmatchedSequence = 0;

      const buildFallbackKey = (item) => {
        const itemName = String(item?.itemName || "").trim();
        const spec = String(item?.spec || "").trim();
        const unit = String(item?.unit || "").trim();
        if (!itemName && !spec && !unit) {
          return "";
        }
        return [itemName, spec, unit].join("｜");
      };

      rows.forEach((row) => {
        const vendorName = row.vendorName || "業者";
        (row.lineItems || []).forEach((item, itemIndex) => {
          const sequence = String(item?.sequence || "").trim();
          const fallbackKey = buildFallbackKey(item);

          let rowKey = "";
          if (sequence) {
            rowKey = `seq:${sequence}`;
          } else if (fallbackKey && fallbackKeyToRowKey.has(fallbackKey)) {
            rowKey = fallbackKeyToRowKey.get(fallbackKey);
          } else if (fallbackKey) {
            rowKey = `fallback:${fallbackKey}`;
          } else {
            unmatchedSequence += 1;
            rowKey = `unmatched:${vendorName}:${itemIndex}:${unmatchedSequence}`;
          }

          if (!itemMap.has(rowKey)) {
            itemMap.set(rowKey, {
              sequence,
              itemName: String(item?.itemName || "").trim(),
              spec: String(item?.spec || "").trim(),
              unit: String(item?.unit || "").trim(),
              amounts: new Map(),
              unitPrices: new Map()
            });
          }

          const merged = itemMap.get(rowKey);
          if (!merged.sequence && sequence) merged.sequence = sequence;
          if (!merged.itemName && item?.itemName) merged.itemName = String(item.itemName).trim();
          if (!merged.spec && item?.spec) merged.spec = String(item.spec).trim();
          if (!merged.unit && item?.unit) merged.unit = String(item.unit).trim();

          if (fallbackKey && !fallbackKeyToRowKey.has(fallbackKey)) {
            fallbackKeyToRowKey.set(fallbackKey, rowKey);
          }

          merged.amounts.set(vendorName, item.amount);
          merged.unitPrices.set(vendorName, item.unitPrice);
        });
      });

      const detailRows = [];

      for (const item of itemMap.values()) {
        const unitPricesByVendor = {};
        vendorNames.forEach((name) => {
          const value = parseLooseNumber(item.unitPrices.get(name));
          unitPricesByVendor[name] = Number.isFinite(value) ? value : null;
        });
        detailRows.push({
          sequence: item.sequence || "",
          itemName: item.itemName || "-",
          spec: item.spec || "-",
          unitPricesByVendor
        });
      }

      detailRows.sort((a, b) => {
        const aSeq = String(a.sequence || "").trim();
        const bSeq = String(b.sequence || "").trim();
        const aHasSeq = Boolean(aSeq);
        const bHasSeq = Boolean(bSeq);

        if (aHasSeq && bHasSeq) {
          const aNum = Number(aSeq);
          const bNum = Number(bSeq);
          if (Number.isFinite(aNum) && Number.isFinite(bNum) && aNum !== bNum) {
            return aNum - bNum;
          }
          return aSeq.localeCompare(bSeq, "ja");
        }
        if (aHasSeq !== bHasSeq) {
          return aHasSeq ? -1 : 1;
        }

        const aLabel = `${a.itemName || ""}｜${a.spec || ""}`;
        const bLabel = `${b.itemName || ""}｜${b.spec || ""}`;
        return aLabel.localeCompare(bLabel, "ja");
      });

      const warnings = rows
        .filter((row) => row.isTargetForm === false || row.parseError)
        .map((row) => `- ${row.vendorName}: ${row.reason || row.parseError || "指定様式外の可能性"}`);

      return {
        rows,
        vendorNames,
        summaryRows,
        detailRows,
        warnings,
        itemCount: detailRows.length,
        vendorCount: vendorNames.length,
        totalLineItemCount: rows.reduce((sum, row) => sum + (row.totalLineItemCount || 0), 0),
        totalAmountItemCount: rows.reduce((sum, row) => sum + (row.amountItemCount || 0), 0)
      };
    }

    function buildComparisonReport(comparisonData) {
      if (!comparisonData || !comparisonData.vendorCount) {
        return "比較対象データがありません。";
      }

      const header = ["連番", "品目", ...comparisonData.vendorNames];
      const lines = [
        "# 業者別 単価比較表",
        "",
        `- 業者数: ${comparisonData.vendorCount}`,
        `- 比較対象品目数: ${comparisonData.itemCount}`,
        "- 左列: 連番（次列: 品目） / 上段: 業者名 / セル: 単価（税抜）",
        "",
        `| ${header.join(" | ")} |`,
        `| ${header.map(() => "---").join(" | ")} |`
      ];

      for (const row of comparisonData.detailRows) {
        const itemLabel = row.spec && row.spec !== "-"
          ? `${row.itemName}（${row.spec}）`
          : row.itemName;
        const sequenceLabel = row.sequence || "-";
        const cells = comparisonData.vendorNames.map((name) => {
          const value = row.unitPricesByVendor?.[name];
          return Number.isFinite(value) ? value : MISSING_UNIT_PRICE_TEXT;
        });
        lines.push(`| ${sequenceLabel} | ${itemLabel} | ${cells.join(" | ")} |`);
      }

      if (comparisonData.warnings.length) {
        lines.push("", "## 注意");
        comparisonData.warnings.forEach((warn) => lines.push(warn));
      }

      return lines.join("\n");
    }

    function toCsvCell(value) {
      const text = String(value ?? "").replace(/"/g, '""');
      return `"${text}"`;
    }

    function downloadCsv(filename, headers, rows) {
      const lines = [headers.map(toCsvCell).join(",")];
      rows.forEach((row) => {
        lines.push(row.map(toCsvCell).join(","));
      });
      const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    async function analyzeBidComparisonForFiles(apiKey, files) {
      const vendors = [];
      const extractedSources = [];
      appendApiLog(`比較抽出開始: ${files.length}ファイル`);
      appendApiLog("本文抽出+構造化方式: AI（1回）");
      setProgress(5, "比較用PDFを準備中...");

      const directResults = await extractBidSheetsDirectFromPdfFilesWithGemini(apiKey, files);
      appendApiLog("構造化抽出(一括): 1回実行");

      const byFileName = new Map(
        directResults.map((entry) => [String(entry?.fileName || "").trim(), entry])
      );

      files.forEach((file, index) => {
        const fallback = directResults[index];
        const structured = byFileName.get(String(file?.name || "").trim()) || fallback;

        if (!structured || typeof structured !== "object") {
          vendors.push({
            vendorName: normalizeVendorName("", file.name),
            isTargetForm: false,
            reason: "一括構造化結果に対象データがありません",
            parseError: "missing_result",
            lineItems: []
          });
          return;
        }

        const rawPages = Array.isArray(structured?.rawExtractedPages)
          ? structured.rawExtractedPages
            .map((entry) => ({
              page: Number(entry?.page),
              text: String(entry?.text || "").trim()
            }))
            .filter((entry) => Number.isFinite(entry.page) && entry.page > 0 && entry.text)
            .sort((a, b) => a.page - b.page)
          : [];

        const sourceText = rawPages.length
          ? rawPages.map((entry) => `--- Page ${entry.page} ---\n${entry.text}`).join("\n\n").trim()
          : String(structured?.rawExtractedText || "").trim();

        extractedSources.push({
          fileName: file.name,
          sourceText
        });
        if (index === 0 && sourceText) {
          updatePreviewGeminiText(sourceText, file.name);
        }

        const vendorList = Array.isArray(structured?.vendors) ? structured.vendors : [];
        if (!vendorList.length) {
          const fallbackVendor = buildFallbackVendorFromSourceText(sourceText, file.name);
          if (fallbackVendor) {
            vendors.push(fallbackVendor);
            return;
          }
          vendors.push({
            vendorName: normalizeVendorName("", file.name),
            isTargetForm: false,
            reason: "業者データが見つかりません",
            parseError: "missing_vendors",
            lineItems: []
          });
          return;
        }

        vendorList.forEach((vendorEntry, vendorIndex) => {
          const lineItems = Array.isArray(vendorEntry?.lineItems)
            ? vendorEntry.lineItems
              .map((item) => normalizeLineItem(item, sourceText))
              .filter((item) => item.itemName || item.spec)
            : [];

          const fallbackVendorName = vendorList.length > 1
            ? `${file.name.replace(/\.pdf$/i, "")}#${vendorIndex + 1}`
            : file.name;

          vendors.push({
            vendorName: normalizeVendorName(vendorEntry?.vendorName, fallbackVendorName),
            isTargetForm: vendorEntry?.isTargetForm !== false,
            reason: String(vendorEntry?.reason || "").trim(),
            projectName: String(vendorEntry?.projectName || "").trim(),
            quoteDate: String(vendorEntry?.quoteDate || "").trim(),
            validUntil: String(vendorEntry?.validUntil || "").trim(),
            lineItems
          });
        });
      });

      const comparisonData = buildComparisonData(vendors);
      comparisonData.rawExtractedText = extractedSources
        .map((source) => `--- ${source.fileName} ---\n${String(source.sourceText || "").trim()}`)
        .join("\n\n")
        .trim();
      return comparisonData;
    }

    async function analyzeTextWithGemini(apiKey, sourceText) {
      const normalized = String(sourceText || "").trim();
      if (!normalized) {
        throw new Error("PDF抽出テキストが空です。先にPDF抽出を実行してください。");
      }

      const MAX_TEXT_LENGTH = 20000;
      const truncated = normalized.slice(0, MAX_TEXT_LENGTH);
      if (normalized.length > MAX_TEXT_LENGTH) {
        appendApiLog(`PDFテキストが長いため先頭${MAX_TEXT_LENGTH}文字に切り詰めて送信します`);
      }
      const parts = [{ text: buildAiTextRefinePrompt(truncated) }];

      const modelCandidates = [
        "gemini-2.5-flash-lite",
        "gemini-2.5-flash",
        "gemini-2.0-flash"
      ];

      let data = null;
      let lastError = null;
      for (const model of modelCandidates) {
        try {
          data = await callGeminiWithRetry(model, apiKey, parts);
          apiStats.lastModel = model;
          break;
        } catch (error) {
          lastError = error;
          apiStats.lastError = error?.message || "unknown";
          if (![400, 404].includes(error?.status) && !isTransientGeminiError(error)) {
            throw error;
          }
        }
      }
      if (!data) {
        throw lastError || new Error("利用可能なGeminiモデルで解析できませんでした。");
      }

      const refined = (data?.candidates ?? [])
        .flatMap((candidate) => candidate?.content?.parts ?? [])
        .map((part) => part?.text ?? "")
        .join("\n")
        .trim();

      if (!refined) {
        throw new Error("AIの応答が空でした。もう一度お試しください。");
      }

      return refined;
    }

    async function getPreferredCameraStream() {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error("MediaDevicesUnsupported");
      }

      const constraintsList = [
        {
          video: {
            facingMode: { exact: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        },
        {
          video: {
            facingMode: "environment",
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        },
        { video: true, audio: false }
      ];

      for (const constraints of constraintsList) {
        try {
          return await navigator.mediaDevices.getUserMedia(constraints);
        } catch (error) {
          if (!["OverconstrainedError", "NotFoundError", "NotReadableError", "AbortError"].includes(error?.name)) {
            throw error;
          }
        }
      }

      throw new Error("No available camera stream");
    }

    function normalizeJapaneseSpacing(text) {
      let normalized = String(text || "").replace(/\r\n?/g, "\n");
      for (let i = 0; i < 3; i++) {
        normalized = normalized.replace(/([一-龥ぁ-んァ-ヶー々〆ヵヶ])\s+([一-龥ぁ-んァ-ヶー々〆ヵヶ])/g, "$1$2");
      }
      normalized = normalized.replace(/[ \t]+\n/g, "\n");
      normalized = normalized.replace(/\n{3,}/g, "\n\n");
      return normalized.trim();
    }

    function scoreOcrText(text) {
      const value = String(text || "");
      if (!value.trim()) return -1;
      const jp = (value.match(/[一-龥ぁ-んァ-ヶー々〆ヵヶ]/g) || []).length;
      const digits = (value.match(/[0-9０-９]/g) || []).length;
      const asciiWords = (value.match(/[A-Za-z]{2,}/g) || []).length;
      const garbage = (value.match(/[|_]{2,}|\[[^\]]{0,1}\]/g) || []).length;
      return (jp * 2) + digits + asciiWords - (garbage * 2) + Math.min(400, value.length) * 0.2;
    }

        }

        const data = await file.arrayBuffer();
        const loadingTask = window.pdfjsLib.getDocument({ data });
        const pdf = await loadingTask.promise;
        const renderScale = Math.min(4, Math.max(2.5, (parseFloat(scaleInput.value) || 1) * 2.4));
        let allText = "";

        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
